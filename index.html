<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Burger Hause Artesanal</title>
<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
aside{width:240px;background:#111;color:#fff;height:100vh;position:fixed}
aside img{width:180px;margin:20px auto;display:block}
aside button, aside select{
  width:90%;margin:5px auto;display:block;padding:10px;border:none
}
main{margin-left:240px;padding:20px}
.card{background:#fff;padding:10px;margin:10px 0;border-radius:6px}
.branco{background:#fff}
.vermelho{background:#ffcccc}
.verde{background:#ccffcc}
input,select,button{padding:6px;margin:4px}
</style>
</head>

<body>

<aside>
  <img src="logo.png.jpg">
  <select id="diaAtivo" onchange="trocarDia()"></select>
  <button onclick="novoDia()">Novo Dia</button>
  <button onclick="aba='pedido';render()">Pedidos</button>
  <button onclick="aba='entrega';render()">Entregas</button>
  <button onclick="aba='financeiro';render()">Financeiro</button>
  <button onclick="aba='historico';render()">Histórico</button>
</aside>

<main id="app"></main>

<script>
let dados = JSON.parse(localStorage.getItem("burger")) || {};
let hoje = new Date().toLocaleDateString();
let aba = "pedido";

if(!dados[hoje]) dados[hoje]=[];

function salvar(){
 localStorage.setItem("burger",JSON.stringify(dados));
 atualizarDias();
}

function atualizarDias(){
 diaAtivo.innerHTML="";
 Object.keys(dados).forEach(d=>{
  let o=document.createElement("option");
  o.value=d;o.innerText=d;
  diaAtivo.appendChild(o);
 });
 diaAtivo.value=hoje;
}

function trocarDia(){
 hoje=diaAtivo.value;
 render();
}

function novoDia(){
 hoje=new Date().toLocaleDateString();
 if(!dados[hoje]) dados[hoje]=[];
 salvar(); render();
}

function addPedido(){
 let p={
  cliente:cliente.value,
  pedido:pedido.value,
  tipo:tipo.value,
  endereco: tipo.value=="Entrega"?{
   rua:rua.value,bairro:bairro.value,numero:numero.value,comp:comp.value
  }:null,
  pag:pag.value,
  valor:+valor.value,
  status:"Em preparo",
  hora:new Date().toLocaleTimeString()
 };
 dados[hoje].push(p);
 salvar(); render();
}

function render(){
 let html="";
 if(aba=="pedido"){
  html=`
  <h2>Novo Pedido</h2>
  <input id="cliente" placeholder="Cliente">
  <input id="pedido" placeholder="Pedido">
  <select id="tipo" onchange="endBox.style.display=this.value=='Entrega'?'block':'none'">
   <option>Local</option><option>Entrega</option>
  </select>

  <div id="endBox" style="display:none">
   <input id="rua" placeholder="Rua">
   <input id="bairro" placeholder="Bairro">
   <input id="numero" placeholder="Número">
   <input id="comp" placeholder="Complemento">
  </div>

  <select id="pag"><option>Pix</option><option>Cartão</option><option>Dinheiro</option></select>
  <input id="valor" type="number" placeholder="Valor">
  <button onclick="addPedido()">Adicionar</button>

  <h2>Pedidos</h2>`;
  dados[hoje].forEach((p,i)=>{
   let cor=p.status=="Pronto"?"vermelho":p.status=="Entregue"?"verde":"branco";
   html+=`
   <div class="card ${cor}">
   <b>${p.cliente}</b> - ${p.pedido}<br>
   ${p.endereco?`Rua:${p.endereco.rua}, Nº:${p.endereco.numero}`:""}
   <br>Status:
   <select onchange="p.status=this.value;salvar();render()">
    <option ${p.status=="Em preparo"?"selected":""}>Em preparo</option>
    <option ${p.status=="Pronto"?"selected":""}>Pronto</option>
    <option ${p.status=="Saiu"?"selected":""}>Saiu</option>
    <option ${p.status=="Entregue"?"selected":""}>Entregue</option>
   </select>
   <button onclick="printPedido(${i})">Imprimir</button>
   </div>`;
  });
 }
 if(aba=="financeiro"){
  let pix=0,car=0,din=0;
  dados[hoje].filter(p=>p.status=="Entregue").forEach(p=>{
   if(p.pag=="Pix")pix+=p.valor;
   if(p.pag=="Cartão")car+=p.valor;
   if(p.pag=="Dinheiro")din+=p.valor;
  });
  html=`<h2>Financeiro ${hoje}</h2>
  Pix: R$${pix}<br>Cartão: R$${car}<br>Dinheiro: R$${din}<br>
  <b>Total: R$${pix+car+din}</b>`;
 }
 if(aba=="historico"){
  html="<h2>Histórico</h2>";
  Object.keys(dados).forEach(d=>{
   html+=`<button onclick="hoje='${d}';render()">${d}</button>`;
  });
 }
 app.innerHTML=html;
 atualizarDias();
}

function printPedido(i){
 let p=dados[hoje][i];
 let w=window.open("","print","width=300");
 w.document.write(`<pre>
BURGER HAUSE
${p.cliente}
${p.pedido}
${p.endereco?`${p.endereco.rua} ${p.endereco.numero}`:""}
${p.pag} R$${p.valor}
</pre>`);
 w.print();
}

render();
</script>
</body>
</html>
