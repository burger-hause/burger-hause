<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burger Hause Artesanal – Gestão</title>

<style>
* { box-sizing: border-box; }
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    display: flex;
}
.sidebar {
    width: 230px;
    background: #000;
    padding: 15px;
}
.sidebar img {
    width: 100%;
    margin-bottom: 20px;
}
.sidebar button {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border: none;
    border-radius: 6px;
    background: #1f1f1f;
    color: #fff;
    font-size: 16px;
}
.sidebar button.active {
    background: #e63946;
}
.content {
    flex: 1;
    padding: 20px;
}
section { display: none; }
section.active { display: block; }

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 6px;
    border: none;
    font-size: 16px;
}
button.primary {
    background: #e63946;
    color: #fff;
    font-weight: bold;
}
.card {
    background: #1f1f1f;
    padding: 12px;
    border-radius: 8px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="sidebar">
    <img src="logo.png">
    <button onclick="trocar('pedidos')" class="active">🧾 Pedidos</button>
    <button onclick="trocar('entregas')">🚚 Entregas</button>
    <button onclick="trocar('financeiro')">💰 Financeiro</button>
    <button onclick="trocar('historico')">📊 Histórico</button>
</div>

<div class="content">

<section id="pedidos" class="active">
<h2>Novo Pedido</h2>
<input id="pedido" placeholder="Pedido">
<input id="cliente" placeholder="Cliente">
<input id="valor" type="number" placeholder="Valor R$">

<select id="tipo">
<option>Local</option>
<option>Entrega</option>
</select>

<input id="endereco" placeholder="Endereço (se entrega)">

<select id="pagamento">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<button class="primary" onclick="salvarPedido()">Salvar Pedido</button>
<div id="listaPedidos"></div>
</section>

<section id="entregas">
<h2>Entregas</h2>
<div id="listaEntregas"></div>
</section>

<section id="financeiro">
<h2>Financeiro do Dia</h2>
<div id="resumoFinanceiro"></div>
</section>

<section id="historico">
<h2>Histórico por Data</h2>
<div id="listaHistorico"></div>
</section>

</div>

<script>
const hoje = new Date().toLocaleDateString();
let dados = JSON.parse(localStorage.getItem("burgerHauseV3")) || {};

if (!dados[hoje]) dados[hoje] = { pedidos: [] };

function trocar(id){
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    event.target.classList.add("active");
    atualizar();
}

function salvarPedido(){
    dados[hoje].pedidos.push({
        pedido: pedido.value,
        cliente: cliente.value,
        valor: Number(valor.value),
        tipo: tipo.value,
        endereco: endereco.value,
        pagamento: pagamento.value,
        status: "Em preparo"
    });
    localStorage.setItem("burgerHauseV3", JSON.stringify(dados));
    document.querySelectorAll("input").forEach(i=>i.value="");
    atualizar();
}

function atualizar(){
    let pedidosDia = dados[hoje].pedidos;
    let lp="", le="", pix=0, din=0, cart=0;

    pedidosDia.forEach(p=>{
        lp+=`<div class="card">${p.pedido} - R$ ${p.valor}</div>`;
        if(p.tipo==="Entrega") le+=`<div class="card">${p.pedido}<br>${p.endereco}</div>`;
        if(p.pagamento==="Pix") pix+=p.valor;
        if(p.pagamento==="Dinheiro") din+=p.valor;
        if(p.pagamento==="Cartão") cart+=p.valor;
    });

    listaPedidos.innerHTML=lp;
    listaEntregas.innerHTML=le;
    resumoFinanceiro.innerHTML=
        `Pix: R$ ${pix}<br>Dinheiro: R$ ${din}<br>Cartão: R$ ${cart}<br><b>Total: R$ ${pix+din+cart}</b>`;

    listaHistorico.innerHTML="";
    Object.keys(dados).forEach(d=>{
        let total = dados[d].pedidos.reduce((s,p)=>s+p.valor,0);
        listaHistorico.innerHTML+=`<div class="card">${d} – Total: R$ ${total}</div>`;
    });
}

atualizar();
</script>

</body>
</html>
