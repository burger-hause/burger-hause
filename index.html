<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema da Lanchonete</title>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;display:flex}
aside{width:220px;background:#222;color:#fff;min-height:100vh}
aside img{width:130px;display:block;margin:15px auto}
aside button{
width:100%;padding:12px;border:none;background:none;
color:#fff;text-align:left;cursor:pointer;font-size:15px
}
aside button:hover{background:#444}

main{flex:1;padding:15px}
.section{display:none}
.section.active{display:block}

input,textarea,select,button{
width:100%;padding:8px;margin:5px 0;box-sizing:border-box
}

.pedido{
background:#fff;
padding:10px;
margin-bottom:10px;
display:grid;
grid-template-columns: 1fr 200px;
gap:10px;
border-radius:6px;
}

.actions{display:flex;flex-direction:column;gap:6px}
.actions button{width:100%}

.item-produto{
background:#eee;
padding:5px;
border-radius:4px;
margin-bottom:4px;
}

.prod-row{
background:#fff;
padding:6px;
margin-bottom:5px;
display:flex;
gap:5px;
}

.autocomplete{
position:relative;
}
.autocomplete-list{
position:absolute;
background:#fff;
border:1px solid #ccc;
width:100%;
max-height:150px;
overflow:auto;
z-index:10;
}
.autocomplete-item{
padding:6px;
cursor:pointer;
}
.autocomplete-item:hover{background:#eee}
</style>
</head>

<body>

<aside>
<img src="logo.png.jpg">
<button onclick="abrir('pedidos')">Pedidos</button>
<button onclick="abrir('entregas')">Entregas</button>
<button onclick="abrir('financeiro')">Financeiro</button>
<button onclick="abrir('produtos')">Produtos</button>
<button onclick="abrir('clientes')">Clientes</button>
</aside>

<main>

<!-- PEDIDOS -->
<div id="pedidos" class="section active">
<h2>Novo Pedido</h2>

<div class="autocomplete">
<input id="buscarCliente" placeholder="Buscar cliente cadastrado" oninput="autocompleteCliente()">
<div id="listaClientesAuto" class="autocomplete-list"></div>
</div>

<input id="cliente" placeholder="Nome do cliente">
<input id="telefonePedido" placeholder="Telefone" readonly>

<select id="tipo" onchange="endereco.style.display=this.value=='Entrega'?'block':'none'">
<option value="Local">Local</option>
<option value="Entrega">Entrega</option>
</select>

<input id="endereco" placeholder="Endereço completo" style="display:none">
<textarea id="obsPedido" placeholder="Observações"></textarea>

<div id="historicoCliente" style="display:none;background:#fff;padding:10px;border-radius:6px">
<b>Histórico do cliente</b>
<div id="infoCliente"></div>
<div id="listaHistorico"></div>
<button onclick="repetirUltimoPedido()">🔁 Repetir último pedido</button>
</div>

<hr>

<input id="buscaProduto" placeholder="Buscar produto" oninput="buscarProduto()">
<select id="listaBusca"></select>
<button onclick="addProduto()">Adicionar Produto</button>

<div id="carrinho"></div>

<textarea id="descricao" placeholder="Descrição do pedido"></textarea>
<input id="valor" placeholder="Valor total" readonly>

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<button onclick="salvarPedido()">Salvar Pedido</button>

<hr>
<h3>Pedidos</h3>
<div id="listaPedidos"></div>
</div>

<!-- ENTREGAS -->
<div id="entregas" class="section">
<h2>Entregas</h2>
<div id="listaEntregas"></div>
</div>

<!-- FINANCEIRO -->
<div id="financeiro" class="section">
<h2>Financeiro</h2>
<button onclick="financeiro('dia')">Hoje</button>
<button onclick="financeiro('semana')">Semana</button>
<button onclick="financeiro('mes')">Mês</button>
<button onclick="financeiro('geral')">Geral</button>
<hr>
<div id="resumo"></div>
</div>

<!-- PRODUTOS -->
<div id="produtos" class="section">
<h2>Produtos</h2>
<input id="nomeProd" placeholder="Nome">
<input id="valorProd" type="number" placeholder="Valor">
<button onclick="addProd()">Adicionar</button>
<hr>
<div id="listaProdutos"></div>
</div>

<!-- CLIENTES -->
<div id="clientes" class="section">
<h2>Clientes</h2>
<input id="nomeCliente" placeholder="Nome">
<input id="telefoneCliente" placeholder="Telefone">
<input id="enderecoCliente" placeholder="Endereço">
<textarea id="obsCliente" placeholder="Observações"></textarea>
<button onclick="addCliente()">Adicionar Cliente</button>
<hr>
<div id="listaClientes"></div>
</div>

</main>

<script>
let produtos=JSON.parse(localStorage.getItem("produtos"))||[]
let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[]
let clientes=JSON.parse(localStorage.getItem("clientes"))||[]
let carrinho=[]
let numPedido=Number(localStorage.getItem("numPedido"))||1

function abrir(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
render()
}

/* CLIENTES */
function addCliente(){
if(!nomeCliente.value)return
clientes.push({
nome:nomeCliente.value,
telefone:telefoneCliente.value,
endereco:enderecoCliente.value,
obs:obsCliente.value
})
nomeCliente.value=telefoneCliente.value=enderecoCliente.value=obsCliente.value=""
saveClientes();renderClientes()
}

function renderClientes(){
listaClientes.innerHTML=""
clientes.forEach((c,i)=>{
listaClientes.innerHTML+=`
<div class="prod-row">
<input value="${c.nome}" onchange="clientes[${i}].nome=this.value;saveClientes()">
<input value="${c.telefone}" onchange="clientes[${i}].telefone=this.value;saveClientes()">
<input value="${c.endereco}" onchange="clientes[${i}].endereco=this.value;saveClientes()">
<textarea onchange="clientes[${i}].obs=this.value;saveClientes()">${c.obs}</textarea>
<button onclick="clientes.splice(${i},1);saveClientes();renderClientes()">🗑️</button>
</div>`
})
}

function saveClientes(){
localStorage.setItem("clientes",JSON.stringify(clientes))
}

/* AUTOCOMPLETE CLIENTE */
function autocompleteCliente(){
listaClientesAuto.innerHTML=""
let v=buscarCliente.value.toLowerCase()
if(!v)return
clientes.forEach(c=>{
if(c.nome.toLowerCase().includes(v)){
let d=document.createElement("div")
d.className="autocomplete-item"
d.innerHTML=`<b>${c.nome}</b><br>${c.telefone}`
d.onclick=()=>{
cliente.value=c.nome
telefonePedido.value=c.telefone
endereco.value=c.endereco
obsPedido.value=c.obs
mostrarHistorico(c.nome)
buscarCliente.value=""
listaClientesAuto.innerHTML=""
}
listaClientesAuto.appendChild(d)
}
})
}

/* HISTÓRICO */
function mostrarHistorico(nome){
let hist=pedidos.filter(p=>p.cliente===nome)
if(hist.length===0){historicoCliente.style.display="none";return}
historicoCliente.style.display="block"
infoCliente.innerHTML=`Pedidos realizados: <b>${hist.length}</b>`
listaHistorico.innerHTML=""
hist.slice(-5).reverse().forEach(p=>{
listaHistorico.innerHTML+=`
<div>#${p.id} – R$ ${p.valor.toFixed(2)}<br>${new Date(p.data).toLocaleString()}</div>`
})
}

function repetirUltimoPedido(){
let nome=cliente.value
let hist=pedidos.filter(p=>p.cliente===nome)
if(hist.length===0)return
let u=hist[hist.length-1]
carrinho=[]
u.descricao.split(",").forEach(i=>{
let [q,...n]=i.trim().split(" ")
let prod=produtos.find(p=>p.nome===n.join(" "))
if(prod)carrinho.push({nome:prod.nome,valor:prod.valor,qtd:+q})
})
renderCarrinho()
}

/* PRODUTOS / CARRINHO */
function addProd(){
if(!nomeProd.value||!valorProd.value)return
produtos.push({nome:nomeProd.value,valor:+valorProd.value})
nomeProd.value=valorProd.value=""
save();render()
}

function buscarProduto(){
listaBusca.innerHTML=""
produtos.filter(p=>p.nome.toLowerCase().includes(buscaProduto.value.toLowerCase()))
.forEach((p,i)=>listaBusca.innerHTML+=`<option value="${i}">${p.nome}</option>`)
}

function addProduto(){
let p=produtos[listaBusca.value]
if(!p)return
let it=carrinho.find(i=>i.nome===p.nome)
it?it.qtd++:carrinho.push({nome:p.nome,valor:p.valor,qtd:1})
renderCarrinho()
}

function renderCarrinho(){
let t=0,d=[]
carrinho.innerHTML=""
carrinho.forEach((p,i)=>{
t+=p.valor*p.qtd
d.push(`${p.qtd}x ${p.nome}`)
carrinho.innerHTML+=`
<div class="item-produto">${p.qtd}x ${p.nome}
<button onclick="p.qtd++;renderCarrinho()">+</button>
<button onclick="p.qtd--;if(p.qtd==0)carrinho.splice(${i},1);renderCarrinho()">-</button>
</div>`
})
descricao.value=d.join(", ")
valor.value=t.toFixed(2)
}

/* PEDIDOS */
function salvarPedido(){
if(!cliente.value||!valor.value)return
pedidos.push({
id:numPedido++,
cliente:cliente.value,
telefone:telefonePedido.value,
descricao:descricao.value,
valor:+valor.value,
tipo:tipo.value,
endereco:endereco.value,
pagamento:pagamento.value,
obs:obsPedido.value,
status:"Em preparo",
data:new Date().toISOString()
})
localStorage.setItem("numPedido",numPedido)
cliente.value=telefonePedido.value=endereco.value=obsPedido.value=descricao.value=valor.value=""
carrinho=[]
save();render()
}

/* RENDER */
function render(){
listaPedidos.innerHTML=""
listaEntregas.innerHTML=""
pedidos.forEach((p,i)=>{
listaPedidos.innerHTML+=`
<div class="pedido">
<div><b>#${p.id}</b> ${p.cliente}<br>${p.descricao}<br>R$ ${p.valor.toFixed(2)}</div>
<div class="actions">
<select onchange="pedidos[${i}].status=this.value;save();render()">
<option ${p.status=="Em preparo"?"selected":""}>Em preparo</option>
<option ${p.status=="Pronto"?"selected":""}>Pronto</option>
<option ${p.status=="Entregue"?"selected":""}>Entregue</option>
</select>
<button onclick="imprimir(pedidos[${i}])">🖨️</button>
</div>
</div>`
if(p.tipo==="Entrega")
listaEntregas.innerHTML+=`${p.cliente}<br>${p.endereco}<hr>`
})
renderProdutos();renderClientes()
}

function renderProdutos(){
listaProdutos.innerHTML=""
produtos.forEach((p,i)=>{
listaProdutos.innerHTML+=`
<div class="prod-row">
<input value="${p.nome}" onchange="produtos[${i}].nome=this.value;save()">
<input type="number" value="${p.valor}" onchange="produtos[${i}].valor=this.value;save()">
<button onclick="produtos.splice(${i},1);save();render()">🗑️</button>
</div>`
})
}

function imprimir(p){
let w=window.open("","","width=300")
w.document.write(`<b>Pedido #${p.id}</b><br>${p.cliente}<br>${p.descricao}<br>R$ ${p.valor}`)
w.print()
}

function financeiro(t){}

function save(){
localStorage.setItem("produtos",JSON.stringify(produtos))
localStorage.setItem("pedidos",JSON.stringify(pedidos))
}

render()
</script>
</body>
</html>
