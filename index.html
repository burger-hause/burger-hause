<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Lanchonete - Controle de Pedidos</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: #222;
    color: #fff;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

nav {
    display: flex;
    background: #333;
}

nav button {
    flex: 1;
    padding: 12px;
    background: none;
    border: none;
    color: #fff;
    cursor: pointer;
}

nav button:hover {
    background: #444;
}

.container {
    padding: 15px;
}

.section {
    display: none;
}

.section.active {
    display: block;
}

input, textarea, select, button {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    box-sizing: border-box;
}

.pedido {
    background: #fff;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 5px;
    font-size: 14px;
}

.pedido strong {
    display: block;
}

.actions {
    display: flex;
    gap: 5px;
}

.actions button {
    flex: 1;
}
</style>
</head>

<body>

<header>🍔 Lanchonete - Controle de Pedidos</header>

<nav>
    <button onclick="mostrarAba('pedidos')">Pedidos</button>
    <button onclick="mostrarAba('entregas')">Entregas</button>
    <button onclick="mostrarAba('financeiro')">Financeiro</button>
</nav>

<div class="container">

<!-- PEDIDOS -->
<div id="pedidos" class="section active">

<h3>Novo Pedido</h3>

<input id="cliente" placeholder="Nome do cliente">
<textarea id="descricao" placeholder="Descrição do pedido"></textarea>

<select id="tipo" onchange="toggleEndereco()">
    <option value="Local">Local</option>
    <option value="Entrega">Entrega</option>
</select>

<textarea id="endereco" placeholder="Endereço completo" style="display:none;"></textarea>

<select id="pagamento">
    <option value="Pix">Pix</option>
    <option value="Cartão">Cartão</option>
    <option value="Dinheiro">Dinheiro</option>
</select>

<input id="valor" type="number" placeholder="Valor do pedido">

<button onclick="adicionarPedido()">Adicionar Pedido</button>

<hr>

<h3>Lista de Pedidos</h3>
<div id="listaPedidos"></div>

</div>

<!-- ENTREGAS -->
<div id="entregas" class="section">
<h3>Entregas</h3>
<div id="listaEntregas"></div>
</div>

<!-- FINANCEIRO -->
<div id="financeiro" class="section">
<h3>Financeiro do Dia</h3>
<div id="financeiroDados"></div>
</div>

</div>

<script>
let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];
let ultimoNumero = parseInt(localStorage.getItem("ultimoNumeroPedido")) || 0;

function salvar() {
    localStorage.setItem("pedidos", JSON.stringify(pedidos));
    localStorage.setItem("ultimoNumeroPedido", ultimoNumero);
}

function mostrarAba(id) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    renderizar();
}

function toggleEndereco() {
    endereco.style.display = tipo.value === "Entrega" ? "block" : "none";
}

function adicionarPedido() {
    if (!cliente.value || !descricao.value || !valor.value) {
        alert("Preencha todos os campos obrigatórios");
        return;
    }

    ultimoNumero++;

    const pedido = {
        numero: ultimoNumero,
        cliente: cliente.value,
        descricao: descricao.value,
        tipo: tipo.value,
        endereco: endereco.value,
        pagamento: pagamento.value,
        valor: parseFloat(valor.value),
        data: new Date().toLocaleString(),
        status: "Em preparo"
    };

    pedidos.push(pedido);
    salvar();
    limparCampos();
    renderizar();
}

function limparCampos() {
    cliente.value = "";
    descricao.value = "";
    endereco.value = "";
    valor.value = "";
}

function alterarStatus(index, status) {
    pedidos[index].status = status;
    salvar();
    renderizar();
}

function excluirPedido(index) {
    if (confirm("Deseja excluir este pedido?")) {
        pedidos.splice(index, 1);
        salvar();
        renderizar();
    }
}

function imprimirPedido(p) {
    const win = window.open("", "print", "width=300,height=600");

    win.document.write(`
<pre style="font-family: monospace;">
LANCHONETE
------------------------
Pedido Nº: ${p.numero}

Cliente: ${p.cliente}

Pedido:
${p.descricao}

Tipo: ${p.tipo}
${p.tipo === "Entrega" ? "Endereço:\n" + p.endereco : "Consumo no local"}

Pagamento: ${p.pagamento}
Valor: R$ ${p.valor.toFixed(2)}

Data: ${p.data}
------------------------
</pre>
    `);

    win.document.close();
    win.print();
}

function renderizar() {
    // PEDIDOS
    listaPedidos.innerHTML = "";
    pedidos.forEach((p, i) => {
        listaPedidos.innerHTML += `
        <div class="pedido">
            <strong>Pedido Nº ${p.numero} - ${p.cliente}</strong>
            ${p.descricao}<br>
            ${p.tipo === "Entrega" ? "📍 " + p.endereco + "<br>" : ""}
            💰 R$ ${p.valor.toFixed(2)}<br>
            ${p.data}<br>
            Pagamento: ${p.pagamento}<br>

            <select onchange="alterarStatus(${i}, this.value)">
                <option ${p.status=="Em preparo"?"selected":""}>Em preparo</option>
                <option ${p.status=="Pronto"?"selected":""}>Pronto</option>
                <option ${p.status=="Entregue"?"selected":""}>Entregue</option>
            </select>

            <div class="actions">
                <button onclick='imprimirPedido(pedidos[${i}])'>🖨 Imprimir</button>
                <button onclick="excluirPedido(${i})">🗑 Excluir</button>
            </div>
        </div>`;
    });

    // ENTREGAS
    listaEntregas.innerHTML = "";
    pedidos.filter(p => p.tipo === "Entrega").forEach(p => {
        listaEntregas.innerHTML += `
        <div class="pedido">
            <strong>Pedido Nº ${p.numero}</strong>
            ${p.cliente}<br>
            ${p.endereco}<br>
            Status: ${p.status}
        </div>`;
    });

    // FINANCEIRO
    let total = { Pix:0, Cartão:0, Dinheiro:0 };

    pedidos.filter(p => p.status === "Entregue").forEach(p => {
        total[p.pagamento] += p.valor;
    });

    financeiroDados.innerHTML = `
        Pix: R$ ${total.Pix.toFixed(2)}<br>
        Cartão: R$ ${total.Cartão.toFixed(2)}<br>
        Dinheiro: R$ ${total.Dinheiro.toFixed(2)}<br>
        <hr>
        <strong>Total: R$ ${(total.Pix + total.Cartão + total.Dinheiro).toFixed(2)}</strong>
    `;
}

renderizar();
</script>

</body>
</html>
