<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burger Hause Artesanal - Sistema</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
}

/* MENU LATERAL */
.sidebar {
  width: 240px;
  height: 100vh;
  background: #000;
  position: fixed;
  left: 0;
  top: 0;
  padding: 20px;
}

.logo {
  text-align: center;
  margin-bottom: 30px;
}

.logo img {
  width: 150px;
}

/* MENU */
.menu button {
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  background: #b30000;
  border: none;
  color: #fff;
  cursor: pointer;
  font-size: 16px;
  border-radius: 5px;
}

.menu button:hover {
  background: #ff0000;
}

/* CONTEÚDO */
.content {
  margin-left: 260px;
  padding: 20px;
}

.section {
  display: none;
}

.section.active {
  display: block;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 5px;
  border: none;
}

.card {
  background: #1c1c1c;
  padding: 15px;
  margin: 10px 0;
  border-radius: 5px;
}

.status {
  font-weight: bold;
  margin-top: 5px;
}

.btn {
  margin-top: 5px;
  padding: 8px;
  background: #ff0000;
  border: none;
  color: #fff;
  cursor: pointer;
  border-radius: 5px;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="sidebar">
  <div class="logo">
    <img src="./logo.png.jpg">
  </div>

  <div class="menu">
    <button onclick="showSection('pedidos')">Pedidos</button>
    <button onclick="showSection('entregas')">Entregas</button>
    <button onclick="showSection('financeiro')">Financeiro</button>
    <button onclick="novoPeriodo()">Novo Período</button>
  </div>
</div>

<!-- CONTEÚDO -->
<div class="content">

<!-- PEDIDOS -->
<div id="pedidos" class="section active">
  <h2>Pedidos</h2>

  <input id="cliente" placeholder="Cliente">
  <input id="pedido" placeholder="Pedido">
  <select id="tipo">
    <option value="Local">Local</option>
    <option value="Entrega">Entrega</option>
  </select>
  <input id="valor" type="number" placeholder="Valor">
  <button class="btn" onclick="addPedido()">Adicionar Pedido</button>

  <h3>Em preparo</h3>
  <div id="listaPreparo"></div>

  <h3>Para entrega</h3>
  <div id="listaEntrega"></div>
</div>

<!-- ENTREGAS -->
<div id="entregas" class="section">
  <h2>Entregas</h2>
  <div id="listaEntregas"></div>
</div>

<!-- FINANCEIRO -->
<div id="financeiro" class="section">
  <h2>Financeiro do Dia</h2>
  <div id="financeiroDia"></div>
</div>

</div>

<script>
let dataHoje = new Date().toLocaleDateString();
let dados = JSON.parse(localStorage.getItem("burger")) || {};

if (!dados[dataHoje]) {
  dados[dataHoje] = { pedidos: [], financeiro: 0 };
}

function salvar() {
  localStorage.setItem("burger", JSON.stringify(dados));
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function addPedido() {
  let p = {
    cliente: cliente.value,
    pedido: pedido.value,
    tipo: tipo.value,
    valor: Number(valor.value),
    status: "Em preparo"
  };

  dados[dataHoje].pedidos.push(p);
  dados[dataHoje].financeiro += p.valor;
  salvar();
  render();
}

function alterarStatus(i) {
  let p = dados[dataHoje].pedidos[i];
  if (p.status === "Em preparo") p.status = "Pronto";
  else if (p.status === "Pronto") p.status = "Saiu para entrega";
  salvar();
  render();
}

function excluirPedido(i) {
  dados[dataHoje].financeiro -= dados[dataHoje].pedidos[i].valor;
  dados[dataHoje].pedidos.splice(i, 1);
  salvar();
  render();
}

function render() {
  listaPreparo.innerHTML = "";
  listaEntrega.innerHTML = "";
  listaEntregas.innerHTML = "";

  dados[dataHoje].pedidos.forEach((p, i) => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <b>${p.cliente}</b><br>
      ${p.pedido} - R$ ${p.valor}<br>
      <span class="status">${p.status}</span><br>
      <button class="btn" onclick="alterarStatus(${i})">Mudar status</button>
      <button class="btn" onclick="excluirPedido(${i})">Excluir</button>
    `;

    if (p.tipo === "Entrega") listaEntrega.appendChild(div);
    else listaPreparo.appendChild(div);

    if (p.status === "Saiu para entrega") listaEntregas.appendChild(div.cloneNode(true));
  });

  financeiroDia.innerHTML = `<h3>Total: R$ ${dados[dataHoje].financeiro}</h3>`;
}

function novoPeriodo() {
  dataHoje = new Date().toLocaleDateString();
  if (!dados[dataHoje]) dados[dataHoje] = { pedidos: [], financeiro: 0 };
  salvar();
  render();
}

render();
</script>

</body>
</html>
