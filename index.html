<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Lanchonete</title>

<style>
body{margin:0;font-family:Arial}
header{background:#111;color:#fff;padding:10px;text-align:center}
main{display:flex;height:calc(100vh - 60px)}
nav{width:220px;background:#222;color:#fff;padding:10px}
nav button{width:100%;margin-bottom:5px;padding:8px;border:0;background:#444;color:#fff;cursor:pointer}
section{flex:1;padding:10px;overflow:auto}
.hidden{display:none}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ccc;padding:5px}
input,select,button{padding:6px;margin:3px}
</style>
</head>

<body>

<header>
<img src="logo.png.jpg" height="40"><br>
<b>SISTEMA DA LANCHONETE</b>
</header>

<main>
<nav>
<button onclick="show('pedidos')">Pedidos</button>
<button onclick="entregas()">Entregas</button>
<button onclick="show('produtos')">Produtos</button>
<button onclick="show('clientes')">Clientes</button>
</nav>

<!-- PEDIDOS -->
<section id="pedidos">
<h2>Pedidos</h2>
<table id="listaPedidos"></table>
</section>

<!-- PRODUTOS -->
<section id="produtos" class="hidden">
<h2>Produtos</h2>
<input id="nomeProd" placeholder="Nome">
<input id="valorProd" type="number" placeholder="Valor">
<button onclick="addProduto()">Salvar</button>
<table id="listaProdutos"></table>
</section>

<!-- CLIENTES -->
<section id="clientes" class="hidden">
<h2>Clientes</h2>
<input id="nomeCli" placeholder="Nome">
<input id="telCli" placeholder="Telefone">
<input id="endCli" placeholder="Endereço">
<button onclick="addCliente()">Salvar</button>
<table id="listaClientes"></table>
</section>

</main>

<script>
let pedidos = JSON.parse(localStorage.getItem("pedidos")||"[]");
let produtos = JSON.parse(localStorage.getItem("produtos")||"[]");
let clientes = JSON.parse(localStorage.getItem("clientes")||"[]");

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
render();
}

/* 🔥 STATUS CORRIGIDO AQUI */
function alterarStatus(id, novoStatus){
  let pedido = pedidos.find(p => p.id === id);
  if(pedido){
    pedido.status = novoStatus;
    localStorage.setItem("pedidos", JSON.stringify(pedidos));
    render();
  }
}

function renderPedidos(){
let t = document.getElementById("listaPedidos");
t.innerHTML = `
<tr>
<th>ID</th>
<th>Cliente</th>
<th>Status</th>
</tr>
`;

pedidos.forEach(p=>{
t.innerHTML += `
<tr>
<td>${p.id}</td>
<td>${p.cliente || ""}</td>
<td>
<select onchange="alterarStatus(${p.id}, this.value)">
<option ${p.status==="Em preparo"?"selected":""}>Em preparo</option>
<option ${p.status==="Pronto"?"selected":""}>Pronto</option>
<option ${p.status==="Finalizado"?"selected":""}>Finalizado</option>
<option ${p.status==="Entregue"?"selected":""}>Entregue</option>
</select>
</td>
</tr>
`;
});
}

/* PRODUTOS */
function addProduto(){
produtos.push({id:Date.now(),nome:nomeProd.value,valor:+valorProd.value});
localStorage.setItem("produtos",JSON.stringify(produtos));
nomeProd.value=valorProd.value="";
render();
}

function renderProdutos(){
let t=document.getElementById("listaProdutos");
t.innerHTML="<tr><th>Nome</th><th>Valor</th></tr>";
produtos.forEach(p=>{
t.innerHTML+=`<tr><td>${p.nome}</td><td>${p.valor}</td></tr>`;
});
}

/* CLIENTES */
function addCliente(){
clientes.push({id:Date.now(),nome:nomeCli.value,tel:telCli.value,end:endCli.value});
localStorage.setItem("clientes",JSON.stringify(clientes));
nomeCli.value=telCli.value=endCli.value="";
render();
}

function renderClientes(){
let t=document.getElementById("listaClientes");
t.innerHTML="<tr><th>Nome</th><th>Telefone</th><th>Endereço</th></tr>";
clientes.forEach(c=>{
t.innerHTML+=`<tr><td>${c.nome}</td><td>${c.tel}</td><td>${c.end}</td></tr>`;
});
}

function render(){
renderPedidos();
renderProdutos();
renderClientes();
}

render();
</script>

</body>
</html>
