<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Hamburgueria</title>
<style>
body{margin:0;font-family:Arial;display:flex;background:#f2f2f2}
aside{width:220px;background:#1e1e1e;color:#fff;padding:15px}
aside img{width:100%;margin-bottom:15px}
aside button{width:100%;padding:10px;margin-bottom:6px;border:0;cursor:pointer}
main{flex:1;padding:20px}
input,select,textarea,button{width:100%;padding:8px;margin-bottom:6px}
.card{background:#fff;padding:10px;margin-bottom:10px;border:1px solid #ccc}
.hidden{display:none}
.actions button{width:auto;margin-right:5px}
</style>
</head>

<body>

<aside>
<img src="logo.png.jpg">
<button onclick="show('pedidos')">Pedidos</button>
<button onclick="show('entregas')">Entregas</button>
<button onclick="show('financeiro')">Financeiro</button>
<button onclick="show('historico')">Histórico</button>
<button onclick="show('produtos')">Produtos</button>
<button onclick="show('clientes')">Clientes</button>
</aside>

<main>

<section id="pedidos">
<h2>Novo Pedido</h2>
<input id="cliente" placeholder="Cliente">
<select id="tipo">
<option>Local</option>
<option>Entrega</option>
</select>
<input id="endereco" placeholder="Endereço" class="hidden">

<input id="buscaProduto" placeholder="Buscar produto">
<div id="listaBusca"></div>

<textarea id="descricao" placeholder="Descrição"></textarea>
<input id="valor" readonly placeholder="Valor total">

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<button onclick="salvarPedido()">Salvar Pedido</button>
<h2>Pedidos</h2>
<div id="listaPedidos"></div>
</section>

<section id="entregas" class="hidden">
<h2>Entregas</h2>
<div id="listaEntregas"></div>
</section>

<section id="financeiro" class="hidden">
<h2>Financeiro</h2>
<div id="financeiroDados"></div>
</section>

<section id="historico" class="hidden">
<h2>Histórico Financeiro</h2>
<div id="historicoDados"></div>
</section>

<section id="produtos" class="hidden">
<h2>Produtos</h2>
<input id="prodNome" placeholder="Nome">
<input id="prodValor" placeholder="Valor">
<button onclick="addProduto()">Salvar</button>
<div id="listaProdutos"></div>
</section>

<section id="clientes" class="hidden">
<h2>Clientes</h2>
<input id="cliNome" placeholder="Nome">
<input id="cliTel" placeholder="Telefone">
<input id="cliEnd" placeholder="Endereço">
<button onclick="addCliente()">Salvar Cliente</button>
<div id="listaClientes"></div>
</section>

</main>

<script>
let pedidos=JSON.parse(localStorage.pedidos||"[]");
let produtos=JSON.parse(localStorage.produtos||"[]");
let clientes=JSON.parse(localStorage.clientes||"[]");
let historico=JSON.parse(localStorage.historico||"[]");
let carrinho={};

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
render();
}

tipo.onchange=()=>endereco.classList.toggle("hidden",tipo.value!="Entrega");

buscaProduto.oninput=()=>{
listaBusca.innerHTML="";
produtos.filter(p=>p.nome.toLowerCase().includes(buscaProduto.value.toLowerCase()))
.forEach(p=>{
let b=document.createElement("button");
b.textContent=p.nome+" R$"+p.valor;
b.onclick=()=>addItem(p);
listaBusca.appendChild(b);
});
};

function addItem(p){
carrinho[p.id]= (carrinho[p.id]||0)+1;
atualizarDescricao();
}

function atualizarDescricao(){
descricao.value="";
let total=0;
for(let id in carrinho){
let p=produtos.find(x=>x.id==id);
descricao.value+=`${carrinho[id]}x ${p.nome}\n`;
total+=carrinho[id]*p.valor;
}
valor.value=total.toFixed(2);
}

function salvarPedido(){
let pedido={
id:Date.now(),
cliente:cliente.value,
tipo:tipo.value,
endereco:endereco.value,
descricao:descricao.value,
valor:Number(valor.value),
pagamento:pagamento.value,
data:new Date().toLocaleString(),
status:"Em preparo"
};
pedidos.push(pedido);
localStorage.pedidos=JSON.stringify(pedidos);
carrinho={};
location.reload();
}

function renderPedidos(){
listaPedidos.innerHTML="";
pedidos.forEach(p=>{
listaPedidos.innerHTML+=`
<div class="card">
<b>#${p.id}</b><br>
${p.cliente}<br>
${p.descricao}<br>
${p.endereco||""}<br>
R$ ${p.valor} (${p.pagamento})<br>
${p.data}<br>
<select onchange="setStatus(${p.id},this.value)">
<option ${p.status=="Em preparo"?"selected":""}>Em preparo</option>
<option ${p.status=="Saiu para entrega"?"selected":""}>Saiu para entrega</option>
<option ${p.status=="Finalizado"?"selected":""}>Finalizado</option>
</select>
<div class="actions">
<button onclick="imprimir(${p.id})">Imprimir</button>
<button onclick="excluir(${p.id})">Excluir</button>
</div>
</div>`;
});
}

function setStatus(id,s){
let p=pedidos.find(x=>x.id==id);
p.status=s;
if(s=="Finalizado"){
historico.push({...p});
localStorage.historico=JSON.stringify(historico);
}
localStorage.pedidos=JSON.stringify(pedidos);
render();
}

function renderEntregas(){
listaEntregas.innerHTML="";
pedidos.filter(p=>p.tipo=="Entrega" && p.status!="Finalizado")
.forEach(p=>listaEntregas.innerHTML+=`<div class="card">${p.cliente}<br>${p.endereco}<br>${p.status}</div>`);
}

function renderFinanceiro(){
let t={Pix:0,Cartão:0,Dinheiro:0};
pedidos.filter(p=>p.status=="Finalizado").forEach(p=>t[p.pagamento]+=p.valor);
financeiroDados.innerHTML=`
Pix: R$ ${t.Pix}<br>
Cartão: R$ ${t.Cartão}<br>
Dinheiro: R$ ${t.Dinheiro}<br>
<b>Total: R$ ${(t.Pix+t.Cartão+t.Dinheiro).toFixed(2)}</b>`;
}

function renderHistorico(){
historicoDados.innerHTML="";
historico.forEach(p=>{
historicoDados.innerHTML+=`<div class="card">${p.data}<br>R$ ${p.valor}</div>`;
});
}

function imprimir(id){
let p=pedidos.find(x=>x.id==id);
let w=window.open("");
w.document.write(`<img src="logo.png.jpg" width="200"><br>
Pedido #${p.id}<br>${p.cliente}<br>${p.endereco||""}<br>
${p.descricao}<br>R$ ${p.valor}<br>${p.pagamento}<br>${p.data}`);
w.print();
}

function excluir(id){
if(confirm("Excluir pedido?")){
pedidos=pedidos.filter(p=>p.id!=id);
localStorage.pedidos=JSON.stringify(pedidos);
render();
}
}

function addProduto(){
produtos.push({id:Date.now(),nome:prodNome.value,valor:Number(prodValor.value)});
localStorage.produtos=JSON.stringify(produtos);
location.reload();
}

function addCliente(){
clientes.push({id:Date.now(),nome:cliNome.value,tel:cliTel.value,end:cliEnd.value});
localStorage.clientes=JSON.stringify(clientes);
location.reload();
}

function render(){
renderPedidos();
renderEntregas();
renderFinanceiro();
renderHistorico();
}

render();
</script>

</body>
</html>
