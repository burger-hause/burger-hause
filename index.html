<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Lanchonete</title>

<style>
body{margin:0;font-family:Arial}
header{background:#111;color:#fff;padding:10px;text-align:center}
main{display:flex;height:calc(100vh - 60px)}
nav{width:220px;background:#222;color:#fff;padding:10px}
nav button{width:100%;margin-bottom:5px;padding:8px;border:0;background:#444;color:#fff;cursor:pointer}
section{flex:1;padding:10px;overflow:auto}
.hidden{display:none}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ccc;padding:5px}
input,select,button{padding:6px;margin:3px}
button.print{background:#0a7;color:#fff}
</style>
</head>

<body>

<header>
<img src="logo.png.jpg" height="40"><br>
<b>SISTEMA DA LANCHONETE</b>
</header>

<main>
<nav>
<button onclick="show('pedidos')">Pedidos</button>
<button onclick="show('entregas')">Entregas</button>
<button onclick="show('financeiro')">Financeiro</button>
<button onclick="show('historico')">Histórico</button>
<button onclick="show('produtos')">Produtos</button>
<button onclick="show('clientes')">Clientes</button>
</nav>

<!-- PEDIDOS -->
<section id="pedidos">
<h2>Novo / Editar Pedido</h2>

<input type="hidden" id="pedidoEditando">

Cliente:
<select id="clienteSelect"></select><br>

Tipo:
<select id="tipo" onchange="toggleEndereco()">
<option>Local</option>
<option>Entrega</option>
</select><br>

Endereço:
<input id="endereco"><br>

Pagamento:
<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select><br>

Produto:
<input id="buscaProduto" placeholder="Buscar produto" oninput="buscarProduto()">
<div id="listaBusca"></div>

<h4>Itens</h4>
<ul id="itens"></ul>

<b>Total: R$ <span id="total">0.00</span></b><br>

<button onclick="salvarPedido(false)">Salvar</button>
<button class="print" onclick="salvarPedido(true)">Salvar e Imprimir</button>

<h2>Pedidos</h2>
<table id="listaPedidos"></table>
</section>

<!-- ENTREGAS -->
<section id="entregas" class="hidden">
<h2>Entregas</h2>
<table id="listaEntregas"></table>
</section>

<!-- FINANCEIRO -->
<section id="financeiro" class="hidden">
<h2>Financeiro</h2>
<select id="filtroFinanceiro" onchange="renderFinanceiro()">
<option value="dia">Hoje</option>
<option value="semana">Semana</option>
<option value="mes">Mês</option>
<option value="total">Total</option>
</select>
<div id="financeiroDados"></div>
</section>

<!-- HISTÓRICO -->
<section id="historico" class="hidden">
<h2>Histórico</h2>
<select id="filtroHistorico" onchange="renderHistorico()">
<option value="dia">Hoje</option>
<option value="semana">Semana</option>
<option value="mes">Mês</option>
</select>
<button onclick="limparHistorico()">Excluir período</button>
<table id="listaHistorico"></table>
</section>

<!-- PRODUTOS -->
<section id="produtos" class="hidden">
<h2>Produtos</h2>
<input type="hidden" id="prodEditando">
<input id="nomeProd" placeholder="Nome">
<input id="valorProd" type="number" placeholder="Valor">
<button onclick="salvarProduto()">Salvar</button>
<table id="listaProdutos"></table>
</section>

<!-- CLIENTES -->
<section id="clientes" class="hidden">
<h2>Clientes</h2>
<input type="hidden" id="cliEditando">
<input id="nomeCli" placeholder="Nome">
<input id="telCli" placeholder="Telefone">
<input id="endCli" placeholder="Endereço">
<button onclick="salvarCliente()">Salvar</button>
<table id="listaClientes"></table>
</section>

</main>

<script>
let pedidos=JSON.parse(localStorage.getItem("pedidos")||"[]");
let produtos=JSON.parse(localStorage.getItem("produtos")||"[]");
let clientes=JSON.parse(localStorage.getItem("clientes")||"[]");
let itensPedido=[];

/* UTIL */
function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
render();
}

function toggleEndereco(){
endereco.style.display = tipo.value=="Entrega"?"block":"none";
}

/* PRODUTOS */
function buscarProduto(){
listaBusca.innerHTML="";
let v=buscaProduto.value.toLowerCase();
produtos.filter(p=>p.nome.toLowerCase().includes(v)).forEach(p=>{
let b=document.createElement("button");
b.textContent=`${p.nome} R$${p.valor}`;
b.onclick=()=>addItem(p);
listaBusca.appendChild(b);
});
}

function addItem(p){
let i=itensPedido.find(x=>x.id==p.id);
if(i)i.qtd++; else itensPedido.push({...p,qtd:1});
renderItens();
}

function renderItens(){
itens.innerHTML="";
let t=0;
itensPedido.forEach(i=>{
t+=i.valor*i.qtd;
itens.innerHTML+=`<li>${i.qtd}x ${i.nome}</li>`;
});
total.textContent=t.toFixed(2);
}

/* PEDIDOS */
function salvarPedido(imprimirAgora){
let id=pedidoEditando.value||Date.now();
pedidos=pedidos.filter(p=>p.id!=id);

let pedido={
id,
cliente:clienteSelect.value,
tipo:tipo.value,
endereco:endereco.value,
pagamento:pagamento.value,
itens:[...itensPedido],
valor:+total.textContent,
status:"Em preparo",
data:new Date().toISOString()
};

pedidos.push(pedido);
localStorage.setItem("pedidos",JSON.stringify(pedidos));

itensPedido=[];
pedidoEditando.value="";
render();

if(imprimirAgora) imprimirPedido(pedido);
}

function editarPedido(id){
let p=pedidos.find(p=>p.id==id);
pedidoEditando.value=p.id;
clienteSelect.value=p.cliente;
tipo.value=p.tipo;
endereco.value=p.endereco;
pagamento.value=p.pagamento;
itensPedido=[...p.itens];
renderItens();
show("pedidos");
}

/* IMPRESSÃO */
function imprimirPedido(p){
let w=window.open("","","width=300");
w.document.write(`
<center>
<img src="logo.png.jpg" width="120"><br>
<b>Pedido #${p.id}</b>
</center><hr>
Cliente: ${p.cliente}<br>
${p.tipo=="Entrega"?"Endereço: "+p.endereco+"<br>":""}
<hr>
${p.itens.map(i=>`${i.qtd}x ${i.nome}`).join("<br>")}
<hr>
<b>Total: R$ ${p.valor.toFixed(2)}</b><br>
Pagamento: ${p.pagamento}<br>
${new Date(p.data).toLocaleString()}
`);
w.print();
}

/* RENDER PEDIDOS */
function renderPedidos(){
listaPedidos.innerHTML="<tr><th>ID</th><th>Cliente</th><th>Status</th><th>Ações</th></tr>";
pedidos.forEach(p=>{
listaPedidos.innerHTML+=`
<tr>
<td>${p.id}</td>
<td>${p.cliente}</td>
<td>${p.status}</td>
<td>
<button onclick="editarPedido(${p.id})">✏️</button>
<button onclick="imprimirPedido(pedidos.find(x=>x.id==${p.id}))">🖨️</button>
<button onclick="pedidos=pedidos.filter(x=>x.id!=${p.id});localStorage.setItem('pedidos',JSON.stringify(pedidos));render()">❌</button>
</td>
</tr>`;
});
}

/* CLIENTES */
function salvarCliente(){
let id=cliEditando.value;
if(id){
let c=clientes.find(c=>c.id==id);
c.nome=nomeCli.value;c.tel=telCli.value;c.end=endCli.value;
cliEditando.value="";
}else clientes.push({id:Date.now(),nome:nomeCli.value,tel:telCli.value,end:endCli.value});
localStorage.setItem("clientes",JSON.stringify(clientes));
nomeCli.value=telCli.value=endCli.value="";
render();
}

function renderClientes(){
clienteSelect.innerHTML="";
clientes.forEach(c=>clienteSelect.innerHTML+=`<option>${c.nome}</option>`);
listaClientes.innerHTML="<tr><th>Nome</th><th>Telefone</th><th>Endereço</th><th></th></tr>";
clientes.forEach(c=>{
listaClientes.innerHTML+=`
<tr>
<td>${c.nome}</td><td>${c.tel}</td><td>${c.end}</td>
<td><button onclick="cliEditando.value=${c.id};nomeCli.value='${c.nome}';telCli.value='${c.tel}';endCli.value='${c.end}'">✏️</button></td>
</tr>`;
});
}

/* RENDER GERAL */
function render(){
renderPedidos();
renderClientes();
}

render();
</script>

</body>
</html>
