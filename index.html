<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Burger Hause Artesanal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f4f4f4}

/* LAYOUT */
.app{display:flex;height:100vh}
.sidebar{
  width:260px;
  background:#111;
  color:#fff;
  padding:20px;
}
.sidebar img{
  width:100%;
  margin-bottom:30px;
}
.sidebar button{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  background:#b30000;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.sidebar button:hover{background:#ff0000}

.content{
  flex:1;
  padding:20px;
  overflow:auto;
}

/* FORM */
input,select,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
}

/* CARDS */
.card{
  background:#fff;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
}
.preparo{background:#fff}
.pronto{background:#ffd6d6}
.entrega{background:#d6ffd6}

.actions button{
  margin:4px 4px 0 0;
  padding:6px 10px;
}
</style>
</head>

<body>

<div class="app">

<!-- MENU -->
<div class="sidebar">
  <img src="logo.png.jpg">
  <button onclick="show('pedidos')">Pedidos</button>
  <button onclick="show('entregas')">Entregas</button>
  <button onclick="show('financeiro')">Financeiro</button>
  <button onclick="show('historico')">Histórico</button>
  <button onclick="novoDia()">📅 Novo Dia</button>
</div>

<!-- CONTEÚDO -->
<div class="content">

<!-- PEDIDOS -->
<section id="pedidos">
<h2>Novo Pedido</h2>

<input id="cliente" placeholder="Cliente">
<textarea id="pedidoTxt" placeholder="Pedido"></textarea>

<select id="tipo" onchange="toggleEndereco()">
  <option value="Local">Local</option>
  <option value="Entrega">Entrega</option>
</select>

<input id="endereco" placeholder="Endereço de entrega" style="display:none">

<select id="pagamento">
  <option value="Pix">Pix</option>
  <option value="Cartao">Cartão</option>
  <option value="Dinheiro">Dinheiro</option>
</select>

<input id="valor" type="number" placeholder="Valor">

<button onclick="addPedido()">Adicionar Pedido</button>

<h2>Pedidos do Dia</h2>
<div id="listaPedidos"></div>
</section>

<!-- ENTREGAS -->
<section id="entregas" style="display:none">
<h2>Entregas</h2>
<div id="listaEntregas"></div>
</section>

<!-- FINANCEIRO -->
<section id="financeiro" style="display:none">
<h2>Financeiro do Dia</h2>
<p>Pix: R$ <span id="fPix">0</span></p>
<p>Cartão: R$ <span id="fCartao">0</span></p>
<p>Dinheiro: R$ <span id="fDinheiro">0</span></p>
<hr>
<h3>Total: R$ <span id="fTotal">0</span></h3>
</section>

<!-- HISTÓRICO -->
<section id="historico" style="display:none">
<h2>Histórico</h2>
<div id="dias"></div>
<div id="histPedidos"></div>
</section>

</div>
</div>

<script>
let dados = JSON.parse(localStorage.getItem("burgerHause")) || {};
let hoje = new Date().toLocaleDateString("pt-BR");

function baseDia(d=hoje){
  if(!dados[d]) dados[d]={pedidos:[]};
}
baseDia();

function salvar(){
  localStorage.setItem("burgerHause",JSON.stringify(dados));
}

function show(id){
  document.querySelectorAll("section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
  render();
}

function toggleEndereco(){
  endereco.style.display = tipo.value==="Entrega"?"block":"none";
}

function novoDia(){
  hoje = new Date().toLocaleDateString("pt-BR");
  baseDia();
  salvar();
  render();
}

function addPedido(){
  if(!cliente.value||!pedidoTxt.value||!valor.value){
    alert("Preencha todos os campos");
    return;
  }

  let agora=new Date();
  let p={
    cliente:cliente.value,
    pedido:pedidoTxt.value,
    tipo:tipo.value,
    endereco:tipo.value==="Entrega"?endereco.value:"",
    pagamento:pagamento.value,
    valor:Number(valor.value),
    status:"Em preparo",
    data:hoje,
    hora:agora.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})
  };

  dados[hoje].pedidos.push(p);
  salvar();
  render();

  cliente.value=pedidoTxt.value=endereco.value=valor.value="";
}

function classeStatus(s){
  if(s==="Pronto")return"pronto";
  if(s==="Saiu para entrega")return"entrega";
  return"preparo";
}

function render(){
  baseDia();
  listaPedidos.innerHTML="";
  listaEntregas.innerHTML="";

  let fin={Pix:0,Cartao:0,Dinheiro:0};

  dados[hoje].pedidos.forEach((p,i)=>{
    let card=`
    <div class="card ${classeStatus(p.status)}">
      <b>${p.cliente}</b> – ${p.hora}<br>
      ${p.pedido}<br>
      ${p.tipo} ${p.endereco}<br>
      ${p.pagamento} – R$ ${p.valor}<br>
      Status: ${p.status}<br>

      <div class="actions">
        <button onclick="p.status='Em preparo';salvar();render()">Preparo</button>
        <button onclick="p.status='Pronto';salvar();render()">Pronto</button>
        <button onclick="p.status='Saiu para entrega';salvar();render()">Saiu</button>
        <button onclick="p.status='Entregue';salvar();render()">Entregue</button>
        <button onclick="imprimir(${JSON.stringify(p)})">Imprimir</button>
        <button onclick="dados[hoje].pedidos.splice(${i},1);salvar();render()">Excluir</button>
      </div>
    </div>`;
    
    listaPedidos.innerHTML+=card;
    if(p.tipo==="Entrega") listaEntregas.innerHTML+=card;
    if(p.status==="Entregue") fin[p.pagamento]+=p.valor;
  });

  fPix.innerText=fin.Pix;
  fCartao.innerText=fin.Cartao;
  fDinheiro.innerText=fin.Dinheiro;
  fTotal.innerText=fin.Pix+fin.Cartao+fin.Dinheiro;

  renderHistorico();
}

function renderHistorico(){
  dias.innerHTML="";
  histPedidos.innerHTML="";
  Object.keys(dados).forEach(d=>{
    dias.innerHTML+=`<button onclick="verDia('${d}')">${d}</button>`;
  });
}

function verDia(d){
  histPedidos.innerHTML="";
  dados[d].pedidos.forEach(p=>{
    histPedidos.innerHTML+=`
    <div class="card">
      ${p.data} ${p.hora}<br>
      ${p.cliente}<br>
      ${p.pedido}<br>
      ${p.status}
    </div>`;
  });
}

function imprimir(p){
  let w=window.open("","","width=300");
  w.document.write(`
  <body style="font-family:monospace">
  BURGER HAUSE ARTESANAL<br>
  ${p.data} ${p.hora}<br>
  Cliente: ${p.cliente}<br>
  ${p.tipo}<br>
  ${p.endereco}<br>
  ${p.pedido}<br>
  ${p.pagamento} R$ ${p.valor}<br>
  <script>window.print();window.close()</script>
  </body>`);
}

render();
</script>

</body>
</html>
