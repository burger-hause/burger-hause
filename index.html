<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema da Lanchonete</title>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;display:flex}
aside{width:230px;background:#222;color:#fff;min-height:100vh}
aside img{width:130px;display:block;margin:15px auto}
aside button{
width:100%;padding:12px;border:none;background:none;
color:#fff;text-align:left;cursor:pointer;font-size:15px
}
aside button:hover{background:#444}

main{flex:1;padding:15px}
.section{display:none}
.section.active{display:block}

input,textarea,select,button{
width:100%;padding:8px;margin:5px 0;box-sizing:border-box
}

.pedido,.cliente-box{
background:#fff;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border-left:6px solid #999;
}

.status-preparo{border-color:#e74c3c}
.status-entrega{border-color:#f1c40f}
.status-entregue{border-color:#2ecc71}

.actions{display:flex;flex-direction:column;gap:6px}

.item-produto{
background:#eee;
padding:5px;
border-radius:4px;
margin-bottom:4px;
}

.prod-row{
background:#fff;
padding:6px;
margin-bottom:5px;
display:flex;
gap:5px;
}
.prod-row input{width:100%}

hr{margin:15px 0}
small{color:#555}
</style>
</head>

<body>

<aside>
<img src="logo.png.jpg">
<button onclick="abrir('pedidos')">Pedidos</button>
<button onclick="abrir('entregas')">Entregas</button>
<button onclick="abrir('financeiro')">Financeiro</button>
<button onclick="abrir('historico')">Histórico de Clientes</button>
<button onclick="abrir('produtos')">Produtos</button>
</aside>

<main>

<!-- PEDIDOS -->
<div id="pedidos" class="section active">
<h2>Novo Pedido</h2>

<input id="cliente" placeholder="Nome do cliente">
<input id="telefone" placeholder="Telefone">
<input id="endereco" placeholder="Endereço">

<select id="tipo">
<option value="Local">Local</option>
<option value="Entrega">Entrega</option>
</select>

<input id="buscaProduto" placeholder="Buscar produto" oninput="buscarProduto()">
<select id="listaBusca"></select>
<button onclick="addProduto()">Adicionar Produto</button>

<div id="carrinho"></div>

<textarea id="descricao" placeholder="Descrição do pedido"></textarea>
<input id="valor" placeholder="Valor total" readonly>

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<button onclick="salvarPedido()">Salvar Pedido</button>

<hr>
<h3>Pedidos</h3>
<div id="listaPedidos"></div>
</div>

<!-- ENTREGAS -->
<div id="entregas" class="section">
<h2>Entregas</h2>
<div id="listaEntregas"></div>
</div>

<!-- FINANCEIRO -->
<div id="financeiro" class="section">
<h2>Financeiro</h2>
<button onclick="financeiro('dia')">Hoje</button>
<button onclick="financeiro('semana')">Semana</button>
<button onclick="financeiro('mes')">Mês</button>
<button onclick="financeiro('geral')">Geral</button>
<hr>
<div id="resumo"></div>
</div>

<!-- HISTÓRICO DE CLIENTES -->
<div id="historico" class="section">
<h2>Histórico de Clientes</h2>
<div id="listaClientes"></div>
</div>

<!-- PRODUTOS -->
<div id="produtos" class="section">
<h2>Produtos</h2>
<input id="nomeProd" placeholder="Nome do produto">
<input id="valorProd" type="number" placeholder="Valor">
<button onclick="addProd()">Adicionar Produto</button>
<hr>
<div id="listaProdutos"></div>
</div>

</main>

<script>
let produtos = JSON.parse(localStorage.getItem("produtos")) || []
let pedidos = JSON.parse(localStorage.getItem("pedidos")) || []
let carrinho=[]
let numPedido = localStorage.getItem("numPedido") || 1

function abrir(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
render()
}

/* PRODUTOS */
function addProd(){
if(!nomeProd.value||!valorProd.value)return
produtos.push({nome:nomeProd.value,valor:+valorProd.value})
nomeProd.value="";valorProd.value=""
save();render()
}

function renderProdutos(){
listaProdutos.innerHTML=""
produtos.forEach((p,i)=>{
listaProdutos.innerHTML+=`
<div class="prod-row">
<input value="${p.nome}" onchange="produtos[${i}].nome=this.value;save()">
<input type="number" value="${p.valor}" onchange="produtos[${i}].valor=+this.value;save()">
<button onclick="produtos.splice(${i},1);save();render()">🗑️</button>
</div>`
})
}

/* BUSCA / CARRINHO */
function buscarProduto(){
listaBusca.innerHTML=""
produtos
.filter(p=>p.nome.toLowerCase().includes(buscaProduto.value.toLowerCase()))
.forEach((p,i)=>listaBusca.innerHTML+=`<option value="${i}">${p.nome}</option>`)
}

function addProduto(){
let p=produtos[listaBusca.value]
if(!p)return
let item=carrinho.find(i=>i.nome===p.nome)
item?item.qtd++:carrinho.push({nome:p.nome,valor:p.valor,qtd:1})
renderCarrinho()
}

function renderCarrinho(){
let total=0,desc=[]
carrinho.innerHTML=""
carrinho.forEach((p,i)=>{
total+=p.valor*p.qtd
desc.push(`${p.qtd}x ${p.nome}`)
carrinho.innerHTML+=`
<div class="item-produto">
${p.qtd}x ${p.nome}
<button onclick="p.qtd++;renderCarrinho()">+</button>
<button onclick="p.qtd--;if(p.qtd==0)carrinho.splice(${i},1);renderCarrinho()">-</button>
</div>`
})
descricao.value=desc.join(", ")
valor.value=total.toFixed(2)
}

/* PEDIDOS */
function salvarPedido(){
if(!cliente.value||!valor.value)return
pedidos.push({
id:numPedido++,
cliente:cliente.value,
telefone:telefone.value,
endereco:endereco.value,
descricao:descricao.value,
valor:+valor.value,
pagamento:pagamento.value,
status:"Em preparo",
data:new Date().toISOString()
})
localStorage.setItem("numPedido",numPedido)
cliente.value="";telefone.value="";endereco.value=""
descricao.value="";valor.value=""
carrinho=[]
save();render()
}

function tempoDecorrido(d){
let m=Math.floor((new Date()-new Date(d))/60000)
return m<1?"agora":m+" min"
}

function statusClasse(s){
if(s=="Em preparo")return"status-preparo"
if(s=="Saiu para entrega")return"status-entrega"
return"status-entregue"
}

function statusPedido(i,v){
pedidos[i].status=v
save();render()
}

/* HISTÓRICO DE CLIENTES */
function renderHistorico(){
let mapa={}
pedidos.forEach(p=>{
if(!mapa[p.cliente]){
mapa[p.cliente]={
cliente:p.cliente,
telefone:p.telefone,
endereco:p.endereco,
total:0,
qtd:0,
pedidos:[]
}
}
mapa[p.cliente].total+=p.valor
mapa[p.cliente].qtd++
mapa[p.cliente].pedidos.push(p)
})

listaClientes.innerHTML=""
Object.values(mapa).forEach(c=>{
listaClientes.innerHTML+=`
<div class="cliente-box">
<b>${c.cliente}</b><br>
📞 ${c.telefone}<br>
📍 ${c.endereco}<br>
📦 Pedidos: ${c.qtd}<br>
💰 Total gasto: R$ ${c.total.toFixed(2)}
<hr>
${c.pedidos.map(p=>`
<small>#${p.id} - R$ ${p.valor.toFixed(2)} (${new Date(p.data).toLocaleDateString()})</small>
`).join("<br>")}
</div>`
})
}

/* RENDER */
function render(){
listaPedidos.innerHTML=""
pedidos.forEach((p,i)=>{
listaPedidos.innerHTML+=`
<div class="pedido ${statusClasse(p.status)}">
<b>#${p.id}</b> - ${p.cliente}<br>
${p.descricao}<br>
R$ ${p.valor.toFixed(2)}<br>
${p.status} há ${tempoDecorrido(p.data)}
<select onchange="statusPedido(${i},this.value)">
<option ${p.status=="Em preparo"?"selected":""}>Em preparo</option>
<option ${p.status=="Saiu para entrega"?"selected":""}>Saiu para entrega</option>
<option ${p.status=="Entregue"?"selected":""}>Entregue</option>
</select>
</div>`
})
renderProdutos()
renderHistorico()
}

/* FINANCEIRO */
function financeiro(tipo){
let hoje=new Date()
let total=0
pedidos.filter(p=>p.status==="Entregue").forEach(p=>{
let d=new Date(p.data)
let ok=false
if(tipo=="dia")ok=d.toDateString()==hoje.toDateString()
if(tipo=="semana")ok=(hoje-d)/86400000<=7
if(tipo=="mes")ok=d.getMonth()==hoje.getMonth()
if(tipo=="geral")ok=true
if(ok)total+=p.valor
})
resumo.innerHTML="Total: R$ "+total.toFixed(2)
}

function save(){
localStorage.setItem("produtos",JSON.stringify(produtos))
localStorage.setItem("pedidos",JSON.stringify(pedidos))
}

render()
</script>

</body>
</html>
