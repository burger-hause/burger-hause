<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burger Hause Artesanal</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#111;color:#fff;display:flex}
.sidebar{width:240px;background:#000;padding:15px}
.sidebar img{width:100%;margin-bottom:20px}
.sidebar button{
    width:100%;padding:12px;margin-bottom:10px;
    background:#1f1f1f;color:#fff;border:none;
    border-radius:6px;font-size:16px
}
.sidebar button.active{background:#e63946}
.content{flex:1;padding:20px}
section{display:none}
section.active{display:block}
input,select,button{
    width:100%;padding:10px;margin-top:8px;
    border-radius:6px;border:none;font-size:15px
}
button.primary{background:#e63946;color:#fff;font-weight:bold}
.card{
    background:#1f1f1f;padding:12px;border-radius:8px;margin-top:10px
}
.status{margin-top:6px;font-weight:bold}
.pronto{color:#2ecc71}
.preparo{color:#f1c40f}
.excluir{background:#444;color:#fff;margin-top:6px}
</style>
</head>

<body>

<div class="sidebar">
    <img src="./logo.png">
    <button onclick="trocar('pedidos')" class="active">🧾 Pedidos</button>
    <button onclick="trocar('entregas')">🚚 Entregas</button>
    <button onclick="trocar('financeiro')">💰 Financeiro</button>
    <button onclick="trocar('historico')">📊 Histórico</button>
</div>

<div class="content">

<section id="pedidos" class="active">
<h2>Novo Pedido</h2>

<input id="pedido" placeholder="Pedido">
<input id="cliente" placeholder="Cliente">
<input id="valor" type="number" placeholder="Valor R$">

<select id="tipo">
<option value="Local">Local</option>
<option value="Entrega">Entrega</option>
</select>

<input id="endereco" placeholder="Endereço (se entrega)">

<select id="pagamento">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<button class="primary" onclick="salvarPedido()">Salvar Pedido</button>

<h3>Pedidos em preparo</h3>
<div id="listaPedidos"></div>
</section>

<section id="entregas">
<h2>Pedidos para Entrega</h2>
<div id="listaEntregas"></div>
</section>

<section id="financeiro">
<h2>Financeiro do Dia</h2>
<div id="resumoFinanceiro"></div>
</section>

<section id="historico">
<h2>Histórico por Dia</h2>
<div id="listaHistorico"></div>
</section>

</div>

<script>
const hoje = new Date().toLocaleDateString();
let dados = JSON.parse(localStorage.getItem("burgerHause")) || {};
if(!dados[hoje]) dados[hoje]={pedidos:[]};

function trocar(id){
 document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
 document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"));
 document.getElementById(id).classList.add("active");
 event.target.classList.add("active");
 atualizar();
}

function salvarPedido(){
 dados[hoje].pedidos.push({
  pedido:pedido.value,
  cliente:cliente.value,
  valor:Number(valor.value),
  tipo:tipo.value,
  endereco:endereco.value,
  pagamento:pagamento.value,
  status:"Em preparo"
 });
 localStorage.setItem("burgerHause",JSON.stringify(dados));
 document.querySelectorAll("input").forEach(i=>i.value="");
 atualizar();
}

function mudarStatus(i){
 dados[hoje].pedidos[i].status =
 dados[hoje].pedidos[i].status==="Em preparo"?"Pronto":"Em preparo";
 localStorage.setItem("burgerHause",JSON.stringify(dados));
 atualizar();
}

function excluir(i){
 dados[hoje].pedidos.splice(i,1);
 localStorage.setItem("burgerHause",JSON.stringify(dados));
 atualizar();
}

function atualizar(){
 let p= dados[hoje].pedidos;
 let lp="", le="", pix=0,din=0,car=0;

 p.forEach((x,i)=>{
  if(x.status==="Em preparo"){
   lp+=`
   <div class="card">
    ${x.pedido} - R$ ${x.valor}
    <div class="status preparo">⏳ Em preparo</div>
    <button onclick="mudarStatus(${i})">Marcar como pronto</button>
    <button class="excluir" onclick="excluir(${i})">Excluir</button>
   </div>`;
  }
  if(x.tipo==="Entrega"){
   le+=`
   <div class="card">
    ${x.pedido}<br>${x.endereco}
    <div class="status ${x.status==="Pronto"?"pronto":"preparo"}">
    ${x.status==="Pronto"?"✅ Pedido pronto":"⏳ Em preparo"}
    </div>
   </div>`;
  }
  if(x.pagamento==="Pix")pix+=x.valor;
  if(x.pagamento==="Dinheiro")din+=x.valor;
  if(x.pagamento==="Cartão")car+=x.valor;
 });

 listaPedidos.innerHTML=lp;
 listaEntregas.innerHTML=le;
 resumoFinanceiro.innerHTML=
 `Pix: R$ ${pix}<br>Dinheiro: R$ ${din}<br>Cartão: R$ ${car}<br><b>Total: R$ ${pix+din+car}</b>`;

 listaHistorico.innerHTML="";
 Object.keys(dados).forEach(d=>{
  let t=dados[d].pedidos.reduce((s,p)=>s+p.valor,0);
  listaHistorico.innerHTML+=`<div class="card">${d} — R$ ${t}</div>`;
 });
}

atualizar();
</script>

</body>
</html>
