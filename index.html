<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema da Lanchonete</title>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;display:flex}
aside{width:180px;background:#222;color:#fff;min-height:100vh}
aside img{width:120px;display:block;margin:10px auto}
aside button{
width:100%;padding:12px;border:none;background:none;
color:#fff;text-align:left;cursor:pointer
}
aside button:hover{background:#444}

main{flex:1;padding:15px}
.section{display:none}
.section.active{display:block}

input,textarea,select,button{
width:100%;padding:8px;margin:5px 0;box-sizing:border-box
}

.pedido{
background:#fff;padding:10px;margin-bottom:8px;
display:flex;border-radius:6px
}
.info{flex:1;font-size:14px}
.actions{width:120px;border-left:1px solid #ddd;padding-left:8px}

.item-produto{
background:#eee;padding:5px;border-radius:4px;
margin-bottom:4px;display:flex;
justify-content:space-between;align-items:center
}
.item-produto button{width:auto;padding:2px 6px}
</style>
</head>

<body>

<aside>
<img src="logo.png.jpg">
<button onclick="abrir('pedidos')">Pedidos</button>
<button onclick="abrir('entregas')">Entregas</button>
<button onclick="abrir('financeiro')">Financeiro</button>
<button onclick="abrir('produtos')">Produtos</button>
</aside>

<main>

<!-- PEDIDOS -->
<div id="pedidos" class="section active">
<h3>Novo Pedido</h3>

<input id="cliente" placeholder="Cliente">

<select id="tipo" onchange="toggleEndereco()">
<option value="Local">Local</option>
<option value="Entrega">Entrega</option>
</select>

<input id="endereco" placeholder="Endereço" style="display:none">

<input id="buscaProduto" placeholder="Buscar produto" oninput="buscarProduto()">
<select id="listaBusca"></select>
<button onclick="addProduto()">Adicionar Produto</button>

<div id="carrinho"></div>

<textarea id="descricao" placeholder="Descrição"></textarea>
<input id="valor" readonly>

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<button onclick="salvarPedido()">Salvar Pedido</button>

<hr>
<div id="listaPedidos"></div>
</div>

<!-- ENTREGAS -->
<div id="entregas" class="section">
<h3>Entregas</h3>
<div id="listaEntregas"></div>
</div>

<!-- FINANCEIRO -->
<div id="financeiro" class="section">
<h3>Financeiro (Pedidos Entregues)</h3>
<div id="resumo"></div>
</div>

<!-- PRODUTOS -->
<div id="produtos" class="section">
<h3>Cadastro de Produtos</h3>
<input id="nomeProd" placeholder="Nome">
<input id="valorProd" type="number" placeholder="Valor">
<button onclick="salvarProduto()">Adicionar</button>
<hr>
<div id="listaProdutos"></div>
</div>

</main>

<script>
let produtos=JSON.parse(localStorage.getItem("produtos"))||[]
let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[]
let carrinho=[]
let numPedido=localStorage.getItem("numPedido")||1

function abrir(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
render()
}

function toggleEndereco(){
endereco.style.display=tipo.value==="Entrega"?"block":"none"
}

/* PRODUTOS */
function salvarProduto(){
produtos.push({nome:nomeProd.value,valor:+valorProd.value})
nomeProd.value="";valorProd.value=""
save()
render()
}

function buscarProduto(){
listaBusca.innerHTML=""
produtos.filter(p=>p.nome.toLowerCase().includes(buscaProduto.value.toLowerCase()))
.forEach((p,i)=>listaBusca.innerHTML+=`<option value="${i}">${p.nome}</option>`)
}

function addProduto(){
let p=produtos[listaBusca.value]
let item=carrinho.find(i=>i.nome===p.nome)
item?item.qtd++:carrinho.push({nome:p.nome,valor:p.valor,qtd:1})
renderCarrinho()
}

function renderCarrinho(){
let total=0,desc=[]
carrinhoDiv=carrinho
carrinhoDiv.forEach(p=>{
total+=p.valor*p.qtd
desc.push(`${p.qtd}x ${p.nome}`)
})
carrinho.innerHTML=""
carrinhoDiv.forEach((p,i)=>{
carrinho.innerHTML+=`
<div class="item-produto">
${p.qtd}x ${p.nome}
<button onclick="p.qtd++;renderCarrinho()">+</button>
<button onclick="p.qtd--;if(p.qtd==0)carrinhoDiv.splice(${i},1);renderCarrinho()">-</button>
</div>`
})
descricao.value=desc.join(", ")
valor.value=total.toFixed(2)
}

/* PEDIDOS */
function salvarPedido(){
pedidos.push({
id:numPedido++,
cliente:cliente.value,
descricao:descricao.value,
valor:+valor.value,
tipo:tipo.value,
endereco:endereco.value,
pagamento:pagamento.value,
status:"Em preparo",
data:new Date().toLocaleString()
})
localStorage.setItem("numPedido",numPedido)
cliente.value="";descricao.value="";valor.value=""
carrinho=[]
save();render()
}

function render(){
listaPedidos.innerHTML=""
listaEntregas.innerHTML=""
let tot={Pix:0,Cartão:0,Dinheiro:0}

pedidos.forEach((p,i)=>{
listaPedidos.innerHTML+=`
<div class="pedido">
<div class="info">
<b>#${p.id}</b> ${p.cliente}<br>
${p.descricao}<br>
R$ ${p.valor} | ${p.pagamento}<br>
${p.tipo==="Entrega"?p.endereco:""}<br>
${p.data}
</div>
<div class="actions">
<select onchange="p.status=this.value;save();render()">
<option ${p.status=="Em preparo"?"selected":""}>Em preparo</option>
<option ${p.status=="Pronto"?"selected":""}>Pronto</option>
<option ${p.status=="Entregue"?"selected":""}>Entregue</option>
</select>
<button onclick="pedidos.splice(${i},1);save();render()">Excluir</button>
</div>
</div>`

if(p.tipo==="Entrega")
listaEntregas.innerHTML+=`#${p.id} - ${p.cliente}<br>${p.endereco}<br>${p.status}<hr>`

if(p.status==="Entregue") tot[p.pagamento]+=p.valor
})

resumo.innerHTML=`Pix: R$ ${tot.Pix}<br>Cartão: R$ ${tot.Cartão}<br>Dinheiro: R$ ${tot.Dinheiro}<br><b>Total: R$ ${(tot.Pix+tot.Cartão+tot.Dinheiro).toFixed(2)}</b>`
}

function save(){
localStorage.setItem("produtos",JSON.stringify(produtos))
localStorage.setItem("pedidos",JSON.stringify(pedidos))
}

render()
</script>

</body>
</html>
