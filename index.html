<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Hamburgueria</title>

<style>
body{margin:0;font-family:Arial;display:flex;background:#f2f2f2}
aside{width:220px;background:#1e1e1e;color:#fff;padding:15px}
aside img{width:100%;margin-bottom:15px}
aside button{width:100%;padding:10px;margin-bottom:6px;border:0;cursor:pointer}
main{flex:1;padding:20px}
input,select,textarea,button{width:100%;padding:8px;margin-bottom:6px}
.card{background:#fff;padding:10px;margin-bottom:10px;border:1px solid #ccc}
.hidden{display:none}
.actions button{width:auto;margin-right:5px}
small{color:#555}
</style>
</head>

<body>

<aside>
<img src="logo.png.jpg">
<button onclick="show('pedidos')">Pedidos</button>
<button onclick="show('entregas')">Entregas</button>
<button onclick="show('financeiro')">Financeiro</button>
<button onclick="show('historico')">Histórico</button>
<button onclick="show('produtos')">Produtos</button>
<button onclick="show('clientes')">Clientes</button>
</aside>

<main>

<!-- PEDIDOS -->
<section id="pedidos">
<h2>Novo Pedido</h2>

<input id="buscaCliente" placeholder="Buscar cliente cadastrado">
<div id="listaClientesBusca"></div>

<input id="cliente" placeholder="Nome do cliente">
<input id="telefone" placeholder="Telefone">

<select id="tipo">
<option>Local</option>
<option>Entrega</option>
</select>

<input id="endereco" placeholder="Endereço de entrega" class="hidden">

<input id="buscaProduto" placeholder="Buscar produto">
<div id="listaBusca"></div>

<textarea id="descricao" placeholder="Descrição do pedido"></textarea>
<input id="valor" readonly placeholder="Valor total">

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<button onclick="salvarPedido()">Salvar Pedido</button>

<h2>Pedidos</h2>
<div id="listaPedidos"></div>
</section>

<!-- ENTREGAS -->
<section id="entregas" class="hidden">
<h2>Entregas</h2>
<div id="listaEntregas"></div>
</section>

<!-- FINANCEIRO -->
<section id="financeiro" class="hidden">
<h2>Financeiro</h2>
<select onchange="renderFinanceiro(this.value)">
<option value="dia">Hoje</option>
<option value="semana">Semana</option>
<option value="mes">Mês</option>
<option value="geral">Geral</option>
</select>
<div id="financeiroDados"></div>
</section>

<!-- HISTÓRICO -->
<section id="historico" class="hidden">
<h2>Histórico de Pedidos</h2>
<div id="historicoDados"></div>
</section>

<!-- PRODUTOS -->
<section id="produtos" class="hidden">
<h2>Produtos</h2>
<input id="prodNome" placeholder="Nome do produto">
<input id="prodValor" placeholder="Valor">
<button onclick="addProduto()">Salvar Produto</button>
<div id="listaProdutos"></div>
</section>

<!-- CLIENTES -->
<section id="clientes" class="hidden">
<h2>Clientes</h2>
<input id="cliNome" placeholder="Nome">
<input id="cliTel" placeholder="Telefone">
<input id="cliEnd" placeholder="Endereço">
<button onclick="addCliente()">Salvar Cliente</button>
<div id="listaClientes"></div>
</section>

</main>

<script>
let pedidos=JSON.parse(localStorage.pedidos||"[]");
let produtos=JSON.parse(localStorage.produtos||"[]");
let clientes=JSON.parse(localStorage.clientes||"[]");
let historico=JSON.parse(localStorage.historico||"[]");
let carrinho={};

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
render();
}

tipo.onchange=()=>endereco.classList.toggle("hidden",tipo.value!="Entrega");

/* -------- CLIENTES -------- */
buscaCliente.oninput=()=>{
listaClientesBusca.innerHTML="";
clientes.filter(c=>c.nome.toLowerCase().includes(buscaCliente.value.toLowerCase()))
.forEach(c=>{
let b=document.createElement("button");
b.textContent=c.nome+" - "+c.tel;
b.onclick=()=>{
cliente.value=c.nome;
telefone.value=c.tel;
endereco.value=c.end;
listaClientesBusca.innerHTML="";
};
listaClientesBusca.appendChild(b);
});
};

function addCliente(){
clientes.push({id:Date.now(),nome:cliNome.value,tel:cliTel.value,end:cliEnd.value});
localStorage.clientes=JSON.stringify(clientes);
renderClientes();
}

function renderClientes(){
listaClientes.innerHTML="";
clientes.forEach(c=>{
listaClientes.innerHTML+=`
<div class="card">
<b>${c.nome}</b><br>
${c.tel}<br>
${c.end}<br>
<div class="actions">
<button onclick="editCliente(${c.id})">Editar</button>
<button onclick="delCliente(${c.id})">Excluir</button>
</div>
</div>`;
});
}

function editCliente(id){
let c=clientes.find(x=>x.id==id);
cliNome.value=c.nome; cliTel.value=c.tel; cliEnd.value=c.end;
delCliente(id,false);
}
function delCliente(id,conf=true){
if(!conf||confirm("Excluir cliente?")){
clientes=clientes.filter(c=>c.id!=id);
localStorage.clientes=JSON.stringify(clientes);
renderClientes();
}
}

/* -------- PRODUTOS -------- */
function addProduto(){
produtos.push({id:Date.now(),nome:prodNome.value,valor:Number(prodValor.value)});
localStorage.produtos=JSON.stringify(produtos);
renderProdutos();
}

function renderProdutos(){
listaProdutos.innerHTML="";
produtos.forEach(p=>{
listaProdutos.innerHTML+=`
<div class="card">
${p.nome} - R$ ${p.valor}
<div class="actions">
<button onclick="editProduto(${p.id})">Editar</button>
<button onclick="delProduto(${p.id})">Excluir</button>
</div>
</div>`;
});
}

function editProduto(id){
let p=produtos.find(x=>x.id==id);
prodNome.value=p.nome; prodValor.value=p.valor;
delProduto(id,false);
}
function delProduto(id,conf=true){
if(!conf||confirm("Excluir produto?")){
produtos=produtos.filter(p=>p.id!=id);
localStorage.produtos=JSON.stringify(produtos);
renderProdutos();
}
}

/* -------- PEDIDOS -------- */
buscaProduto.oninput=()=>{
listaBusca.innerHTML="";
produtos.filter(p=>p.nome.toLowerCase().includes(buscaProduto.value.toLowerCase()))
.forEach(p=>{
let b=document.createElement("button");
b.textContent=p.nome+" R$"+p.valor;
b.onclick=()=>addItem(p);
listaBusca.appendChild(b);
});
};

function addItem(p){
carrinho[p.id]=(carrinho[p.id]||0)+1;
atualizarDescricao();
}

function atualizarDescricao(){
descricao.value="";
let total=0;
for(let id in carrinho){
let p=produtos.find(x=>x.id==id);
descricao.value+=`${carrinho[id]}x ${p.nome}\n`;
total+=carrinho[id]*p.valor;
}
valor.value=total.toFixed(2);
}

function salvarPedido(){

  if(!cliente.value || !descricao.value || !valor.value){
    alert("Preencha o pedido corretamente");
    return;
  }

  let pedido = {
    id: Date.now(),
    cliente: cliente.value,
    telefone: telefone.value || "",
    tipo: tipo.value,
    endereco: tipo.value === "Entrega" ? endereco.value : "",
    descricao: descricao.value,
    valor: Number(valor.value),
    pagamento: pagamento.value,
    data: new Date().toLocaleString(),
    status: "Em preparo"
  };

  pedidos.push(pedido);
  localStorage.setItem("pedidos", JSON.stringify(pedidos));

  // LIMPA FORMULÁRIO
  cliente.value = "";
  telefone.value = "";
  endereco.value = "";
  descricao.value = "";
  valor.value = "";
  buscaProduto.value = "";
  buscaCliente.value = "";
  listaBusca.innerHTML = "";
  listaClientesBusca.innerHTML = "";
  carrinho = {};

  render();
}

/* -------- RENDER -------- */
function render(){
renderPedidos();
renderEntregas();
renderFinanceiro("dia");
renderHistorico();
renderProdutos();
renderClientes();
}

/* continua… (status, financeiro por dia/semana/mês, histórico com excluir, impressão) */

render();
</script>

</body>
</html>
