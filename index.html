<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Burger Hause - TESTE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; background:#111; color:#fff; margin:0; padding:20px }
input, select, button { width:100%; padding:10px; margin:5px 0 }
.card { background:#fff; color:#000; padding:10px; margin:5px 0 }
</style>
</head>

<body>

<h2>Burger Hause – Teste Funcionando</h2>

<input id="cliente" placeholder="Cliente">
<input id="pedido" placeholder="Pedido">
<select id="pagamento">
  <option>Pix</option>
  <option>Cartao</option>
  <option>Dinheiro</option>
</select>
<input id="valor" type="number" placeholder="Valor">

<button onclick="add()">Adicionar Pedido</button>

<h3>Pedidos</h3>
<div id="lista"></div>

<script>
let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

function salvar() {
  localStorage.setItem("pedidos", JSON.stringify(pedidos));
}

function add() {
  if (!cliente.value || !pedido.value || !valor.value) {
    alert("Preencha tudo");
    return;
  }

  pedidos.push({
    cliente: cliente.value,
    pedido: pedido.value,
    pagamento: pagamento.value,
    valor: valor.value
  });

  salvar();
  render();
}

function render() {
  lista.innerHTML = "";
  pedidos.forEach(p => {
    lista.innerHTML += `
      <div class="card">
        <b>${p.cliente}</b><br>
        ${p.pedido}<br>
        ${p.pagamento} – R$ ${p.valor}
      </div>
    `;
  });
}

render();
</script>

</body>
</html>
