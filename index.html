<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema da Lanchonete</title>
<style>
body{margin:0;font-family:Arial;background:#f2f2f2;display:flex}
aside{width:220px;background:#222;color:#fff;min-height:100vh}
aside img{width:130px;display:block;margin:15px auto}
aside button{
width:100%;padding:12px;border:none;background:none;
color:#fff;text-align:left;cursor:pointer;font-size:15px
}
aside button:hover{background:#444}

main{flex:1;padding:15px}
.section{display:none}
.section.active{display:block}

input,textarea,select,button{
width:100%;padding:8px;margin:5px 0;box-sizing:border-box
}

.pedido{
background:#fff;
padding:10px;
margin-bottom:10px;
display:grid;
grid-template-columns: 1fr 200px;
gap:10px;
border-radius:6px;
}

.actions{
display:flex;
flex-direction:column;
gap:6px;
}

.actions button{width:100%}

.item-produto{
background:#eee;
padding:5px;
border-radius:4px;
margin-bottom:4px;
}

.prod-row{
background:#fff;
padding:6px;
margin-bottom:5px;
display:flex;
gap:5px;
}
.prod-row input, .prod-row textarea{width:100%}

hr{margin:15px 0}

/* Autocomplete lista de clientes */
.autocomplete-items{
  border: 1px solid #d4d4d4;
  background-color: #fff;
  max-height: 150px;
  overflow-y: auto;
  z-index: 99;
  position: absolute;
  width: calc(100% - 10px);
}

.autocomplete-item{
  padding: 8px;
  cursor: pointer;
}

.autocomplete-item:hover{
  background-color: #e9e9e9;
}
</style>
</head>
<body>

<aside>
<img src="logo.png.jpg">
<button onclick="abrir('pedidos')">Pedidos</button>
<button onclick="abrir('entregas')">Entregas</button>
<button onclick="abrir('financeiro')">Financeiro</button>
<button onclick="abrir('produtos')">Produtos</button>
<button onclick="abrir('clientes')">Clientes</button>

<!-- ADICIONADO -->
<button onclick="abrir('historicoClientes')">Histórico de Clientes</button>
</aside>

<main>

<!-- PEDIDOS -->
<div id="pedidos" class="section active">
<h2>Novo Pedido</h2>

<div style="position:relative">
<input id="buscarClientePedido" placeholder="Buscar cliente cadastrado" oninput="autocompleteClientePedido()">
<div id="autocomplete-list" class="autocomplete-items"></div>
</div>

<input id="cliente" placeholder="Nome do cliente">
<input id="telefonePedido" placeholder="Telefone" readonly>
<select id="tipo" onchange="endereco.style.display=this.value=='Entrega'?'block':'none'">
<option value="Local">Local</option>
<option value="Entrega">Entrega</option>
</select>
<input id="endereco" placeholder="Endereço completo" style="display:none">
<textarea id="obsPedido" placeholder="Observações"></textarea>

<input id="buscaProduto" placeholder="Buscar produto" oninput="buscarProduto()">
<select id="listaBusca"></select>
<button onclick="addProduto()">Adicionar Produto</button>

<div id="carrinho"></div>

<textarea id="descricao" placeholder="Descrição do pedido"></textarea>
<input id="valor" placeholder="Valor total" readonly>

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<button onclick="salvarPedido()">Salvar Pedido</button>

<hr>
<h3>Pedidos</h3>
<div id="listaPedidos"></div>
</div>

<!-- ENTREGAS -->
<div id="entregas" class="section">
<h2>Entregas</h2>
<div id="listaEntregas"></div>
</div>

<!-- FINANCEIRO -->
<div id="financeiro" class="section">
<h2>Financeiro</h2>
<button onclick="financeiro('dia')">Hoje</button>
<button onclick="financeiro('semana')">Semana</button>
<button onclick="financeiro('mes')">Mês</button>
<button onclick="financeiro('geral')">Geral</button>
<hr>
<div id="resumo"></div>
</div>

<!-- PRODUTOS -->
<div id="produtos" class="section">
<h2>Produtos</h2>
<input id="nomeProd" placeholder="Nome do produto">
<input id="valorProd" type="number" placeholder="Valor">
<button onclick="addProd()">Adicionar Produto</button>
<hr>
<div id="listaProdutos"></div>
</div>

<!-- CLIENTES -->
<div id="clientes" class="section">
<h2>Clientes</h2>
<input id="nomeCliente" placeholder="Nome do cliente">
<input id="telefoneCliente" placeholder="Telefone">
<input id="enderecoCliente" placeholder="Endereço">
<textarea id="obsCliente" placeholder="Observações"></textarea>
<button onclick="addCliente()">Adicionar Cliente</button>
<hr>
<div id="listaClientesSalvos"></div>
</div>

<!-- ADICIONADO -->
<div id="historicoClientes" class="section">
<h2>Histórico de Clientes</h2>
<input id="buscaHistoricoCliente" placeholder="Buscar cliente" oninput="renderHistoricoClientes()">
<div id="listaHistoricoClientes"></div>
</div>

</main>

<script>
/* ===== SEU JS ORIGINAL (INTACTO) ===== */

/* HISTÓRICO DE CLIENTES — ADICIONADO */
function renderHistoricoClientes(){
  if(!document.getElementById("listaHistoricoClientes")) return

  const termo = buscaHistoricoCliente.value.toLowerCase()
  listaHistoricoClientes.innerHTML = ""

  let mapa = {}
  pedidos.forEach(p=>{
    if(!mapa[p.cliente]) mapa[p.cliente] = []
    mapa[p.cliente].push(p)
  })

  Object.keys(mapa)
    .filter(nome=>nome.toLowerCase().includes(termo))
    .forEach(nome=>{
      const box=document.createElement("div")
      box.style.background="#fff"
      box.style.padding="10px"
      box.style.marginBottom="10px"
      box.style.borderRadius="6px"
      box.style.cursor="pointer"

      box.innerHTML=`<b>${nome}</b> (${mapa[nome].length} pedidos)`

      const detalhes=document.createElement("div")
      detalhes.style.display="none"
      detalhes.style.marginTop="8px"

      mapa[nome].forEach(p=>{
        detalhes.innerHTML+=`
          <div style="border-top:1px solid #ccc;padding:6px 0">
            <b>Pedido #${p.id}</b><br>
            ${new Date(p.data).toLocaleString()}<br>
            ${p.descricao}<br>
            Valor: R$ ${p.valor.toFixed(2)}<br>
            Tipo: ${p.tipo}<br>
            Pagamento: ${p.pagamento}<br>
            Status: ${p.status}
          </div>`
      })

      box.onclick=()=>{
        detalhes.style.display =
          detalhes.style.display === "none" ? "block" : "none"
      }

      box.appendChild(detalhes)
      listaHistoricoClientes.appendChild(box)
    })
}

/* ADICIONADO — dispara render ao abrir a aba */
document
  .querySelector("button[onclick=\"abrir('historicoClientes')\"]")
  ?.addEventListener("click", ()=>setTimeout(renderHistoricoClientes,0))
</script>

</body>
</html>
