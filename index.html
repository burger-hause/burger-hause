<script>
const cliente = document.getElementById("cliente");
const pedidoTxt = document.getElementById("pedidoTxt");
const tipo = document.getElementById("tipo");
const endereco = document.getElementById("endereco");
const pagamento = document.getElementById("pagamento");
const valor = document.getElementById("valor");

const listaPedidos = document.getElementById("listaPedidos");
const listaEntregas = document.getElementById("listaEntregas");

const fPix = document.getElementById("fPix");
const fCartao = document.getElementById("fCartao");
const fDinheiro = document.getElementById("fDinheiro");
const fTotal = document.getElementById("fTotal");

const dias = document.getElementById("dias");
const histPedidos = document.getElementById("histPedidos");

let dados = JSON.parse(localStorage.getItem("burgerHause")) || {};
let hoje = new Date().toLocaleDateString("pt-BR");

function baseDia(data = hoje) {
  if (!dados[data]) dados[data] = { pedidos: [] };
}

baseDia();

function salvar() {
  localStorage.setItem("burgerHause", JSON.stringify(dados));
}

function show(id) {
  document.querySelectorAll("section").forEach(s => s.style.display = "none");
  document.getElementById(id).style.display = "block";
  render();
}

function toggleEndereco() {
  endereco.style.display = tipo.value === "Entrega" ? "block" : "none";
}

function novoDia() {
  hoje = new Date().toLocaleDateString("pt-BR");
  baseDia(hoje);
  salvar();
  render();
  alert("Novo dia iniciado: " + hoje);
}

function addPedido() {
  if (!cliente.value || !pedidoTxt.value || !valor.value) {
    alert("Preencha cliente, pedido e valor");
    return;
  }

  if (tipo.value === "Entrega" && !endereco.value) {
    alert("Informe o endereço de entrega");
    return;
  }

  const agora = new Date();

  const pedido = {
    cliente: cliente.value,
    pedido: pedidoTxt.value,
    tipo: tipo.value,
    endereco: tipo.value === "Entrega" ? endereco.value : "",
    pagamento: pagamento.value,
    valor: Number(valor.value),
    status: "Em preparo",
    data: hoje,
    hora: agora.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" })
  };

  dados[hoje].pedidos.push(pedido);
  salvar();
  render();

  cliente.value = "";
  pedidoTxt.value = "";
  endereco.value = "";
  valor.value = "";
}

function classeStatus(s) {
  if (s === "Pronto") return "pronto";
  if (s === "Saiu para entrega") return "entrega";
  return "preparo";
}

function render() {
  baseDia();
  listaPedidos.innerHTML = "";
  listaEntregas.innerHTML = "";

  let fin = { Pix: 0, Cartao: 0, Dinheiro: 0 };

  dados[hoje].pedidos.forEach((p, i) => {
    const card = document.createElement("div");
    card.className = "card " + classeStatus(p.status);

    card.innerHTML = `
      <b>${p.cliente}</b> – ${p.hora}<br>
      ${p.pedido}<br>
      ${p.tipo}${p.endereco ? " – " + p.endereco : ""}<br>
      ${p.pagamento} – R$ ${p.valor}<br>
      Status: ${p.status}<br>
      <div class="actions">
        <button onclick="dados['${hoje}'].pedidos[${i}].status='Em preparo';salvar();render()">Preparo</button>
        <button onclick="dados['${hoje}'].pedidos[${i}].status='Pronto';salvar();render()">Pronto</button>
        <button onclick="dados['${hoje}'].pedidos[${i}].status='Saiu para entrega';salvar();render()">Saiu</button>
        <button onclick="dados['${hoje}'].pedidos[${i}].status='Entregue';salvar();render()">Entregue</button>
        <button onclick="imprimir(${JSON.stringify(p).replace(/"/g, '&quot;')})">Imprimir</button>
        <button onclick="dados['${hoje}'].pedidos.splice(${i},1);salvar();render()">Excluir</button>
      </div>
    `;

    listaPedidos.appendChild(card);

    if (p.tipo === "Entrega") listaEntregas.appendChild(card.cloneNode(true));
    if (p.status === "Entregue") fin[p.pagamento] += p.valor;
  });

  fPix.innerText = fin.Pix.toFixed(2);
  fCartao.innerText = fin.Cartao.toFixed(2);
  fDinheiro.innerText = fin.Dinheiro.toFixed(2);
  fTotal.innerText = (fin.Pix + fin.Cartao + fin.Dinheiro).toFixed(2);

  renderHistorico();
}

function renderHistorico() {
  dias.innerHTML = "";
  histPedidos.innerHTML = "";

  Object.keys(dados).forEach(d => {
    const btn = document.createElement("button");
    btn.innerText = d;
    btn.onclick = () => verDia(d);
    dias.appendChild(btn);
  });
}

function verDia(d) {
  histPedidos.innerHTML = "";
  dados[d].pedidos.forEach(p => {
    histPedidos.innerHTML += `
      <div class="card">
        ${p.data} ${p.hora}<br>
        ${p.cliente}<br>
        ${p.pedido}<br>
        ${p.status}
      </div>
    `;
  });
}

function imprimir(p) {
  const w = window.open("", "", "width=300");
  w.document.write(`
    <body style="font-family:monospace">
      BURGER HAUSE ARTESANAL<br>
      ${p.data} ${p.hora}<br>
      Cliente: ${p.cliente}<br>
      ${p.tipo}<br>
      ${p.endereco || ""}<br>
      ${p.pedido}<br>
      ${p.pagamento} – R$ ${p.valor}<br>
      <script>window.print();window.close()</script>
    </body>
  `);
}

render();
</script>
