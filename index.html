<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema da Lanchonete</title>
<style>
body{margin:0;font-family:Arial;background:#f2f2f2;display:flex}
aside{width:220px;background:#222;color:#fff;min-height:100vh}
aside img{width:130px;display:block;margin:15px auto}
aside button{width:100%;padding:12px;border:none;background:none;color:#fff;text-align:left;cursor:pointer}
aside button:hover{background:#444}
main{flex:1;padding:15px}
.section{display:none}
.section.active{display:block}
input,textarea,select,button{width:100%;padding:8px;margin:5px 0}
.pedido{background:#fff;padding:10px;margin-bottom:10px;display:grid;grid-template-columns:1fr 200px;gap:10px;border-radius:6px}
.actions{display:flex;flex-direction:column;gap:6px}
.item-produto{background:#eee;padding:5px;border-radius:4px;margin-bottom:4px}
.prod-row{background:#fff;padding:6px;margin-bottom:5px;display:flex;gap:5px}
.autocomplete-items{border:1px solid #ccc;background:#fff;position:absolute;z-index:99;width:100%;max-height:150px;overflow:auto}
.autocomplete-item{padding:8px;cursor:pointer}
.autocomplete-item:hover{background:#eee}
</style>
</head>

<body>

<aside>
<img src="logo.png.jpg">
<button onclick="abrir('pedidos')">Pedidos</button>
<button onclick="abrir('entregas')">Entregas</button>
<button onclick="abrir('financeiro')">Financeiro</button>
<button onclick="abrir('produtos')">Produtos</button>
<button onclick="abrir('clientes')">Clientes</button>
</aside>

<main>

<div id="pedidos" class="section active">
<h2>Novo Pedido</h2>

<div style="position:relative">
<input id="buscarClientePedido" placeholder="Buscar cliente" oninput="autocompleteClientePedido()">
<div id="autocomplete-list" class="autocomplete-items"></div>
</div>

<input id="cliente" placeholder="Cliente">
<input id="telefonePedido" placeholder="Telefone">
<select id="tipo" onchange="endereco.style.display=this.value=='Entrega'?'block':'none'">
<option>Local</option>
<option>Entrega</option>
</select>
<input id="endereco" placeholder="Endereço" style="display:none">
<textarea id="obsPedido" placeholder="Observações"></textarea>

<input id="buscaProduto" placeholder="Buscar produto" oninput="buscarProduto()">
<select id="listaBusca"></select>
<button onclick="addProduto()">Adicionar Produto</button>

<div id="carrinho"></div>

<textarea id="descricao" placeholder="Descrição"></textarea>
<input id="valor" placeholder="Total" readonly>

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<button onclick="salvarPedido()">Salvar Pedido</button>
<hr>
<div id="listaPedidos"></div>
</div>

<div id="entregas" class="section"><h2>Entregas</h2><div id="listaEntregas"></div></div>
<div id="financeiro" class="section">
<h2>Financeiro</h2>
<button onclick="financeiro('dia')">Hoje</button>
<button onclick="financeiro('semana')">Semana</button>
<button onclick="financeiro('mes')">Mês</button>
<button onclick="financeiro('geral')">Geral</button>
<div id="resumo"></div>
</div>

<div id="produtos" class="section">
<h2>Produtos</h2>
<input id="nomeProd" placeholder="Produto">
<input id="valorProd" type="number" placeholder="Valor">
<button onclick="addProd()">Adicionar</button>
<div id="listaProdutos"></div>
</div>

<div id="clientes" class="section">
<h2>Clientes</h2>
<input id="nomeCliente" placeholder="Nome">
<input id="telefoneCliente" placeholder="Telefone">
<input id="enderecoCliente" placeholder="Endereço">
<textarea id="obsCliente" placeholder="Observações"></textarea>
<button onclick="addCliente()">Adicionar</button>
<div id="listaClientesSalvos"></div>
</div>

</main>

<script>
let produtos = JSON.parse(localStorage.getItem("produtos")) || []
let pedidos = JSON.parse(localStorage.getItem("pedidos")) || []
let clientes = JSON.parse(localStorage.getItem("clientes")) || []
let carrinhoItens = []
let numPedido = Number(localStorage.getItem("numPedido")) || 1
const carrinhoDiv = document.getElementById("carrinho")

function abrir(id){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
 document.getElementById(id).classList.add("active")
 render()
}

function save(){
 localStorage.setItem("produtos",JSON.stringify(produtos))
 localStorage.setItem("pedidos",JSON.stringify(pedidos))
 localStorage.setItem("clientes",JSON.stringify(clientes))
}

function addProd(){
 if(!nomeProd.value||!valorProd.value)return
 produtos.push({nome:nomeProd.value,valor:+valorProd.value})
 nomeProd.value="";valorProd.value=""
 save();render()
}

function buscarProduto(){
 listaBusca.innerHTML=""
 produtos.filter(p=>p.nome.toLowerCase().includes(buscaProduto.value.toLowerCase()))
 .forEach((p,i)=>listaBusca.innerHTML+=`<option value="${i}">${p.nome}</option>`)
}

function addProduto(){
 let p=produtos[listaBusca.value]
 if(!p)return
 let item=carrinhoItens.find(i=>i.nome===p.nome)
 item?item.qtd++:carrinhoItens.push({nome:p.nome,valor:p.valor,qtd:1})
 renderCarrinho()
}

function renderCarrinho(){
 let total=0,desc=[]
 carrinhoDiv.innerHTML=""
 carrinhoItens.forEach((p,i)=>{
  total+=p.valor*p.qtd
  desc.push(`${p.qtd}x ${p.nome}`)
  carrinhoDiv.innerHTML+=`
  <div class="item-produto">
   ${p.qtd}x ${p.nome} - R$ ${(p.valor*p.qtd).toFixed(2)}
   <button onclick="p.qtd++;renderCarrinho()">+</button>
   <button onclick="p.qtd--;if(p.qtd==0)carrinhoItens.splice(${i},1);renderCarrinho()">-</button>
  </div>`
 })
 descricao.value=desc.join(", ")
 valor.value=total.toFixed(2)
}

function salvarPedido(){
 if(!cliente.value||!valor.value||carrinhoItens.length==0)return alert("Pedido inválido")
 pedidos.push({
  id:numPedido++,
  cliente:cliente.value,
  telefone:telefonePedido.value,
  descricao:descricao.value,
  valor:+valor.value,
  tipo:tipo.value,
  endereco:endereco.value,
  pagamento:pagamento.value,
  obs:obsPedido.value,
  status:"Em preparo",
  data:new Date().toISOString()
 })
 localStorage.setItem("numPedido",numPedido)
 carrinhoItens=[]
 cliente.value=telefonePedido.value=endereco.value=descricao.value=valor.value=obsPedido.value=""
 save();render()
}

function imprimirPedido(p){
 let w=window.open("","","width=300")
 w.document.write(`<b>Pedido #${p.id}</b><br>${p.cliente}<br>${p.descricao}<br>R$ ${p.valor.toFixed(2)}`)
 w.print()
 w.onafterprint=()=>w.close()
}

function render(){
 listaPedidos.innerHTML=""
 listaEntregas.innerHTML=""
 pedidos.forEach((p,i)=>{
  listaPedidos.innerHTML+=`
  <div class="pedido">
   <div>#${p.id} ${p.cliente}<br>${p.descricao}<br>R$ ${p.valor.toFixed(2)}</div>
   <div class="actions">
    <button onclick="imprimirPedido(pedidos[${i}])">🖨️</button>
    <button onclick="pedidos.splice(${i},1);save();render()">🗑️</button>
   </div>
  </div>`
 })
}

render()
</script>

</body>
</html>
